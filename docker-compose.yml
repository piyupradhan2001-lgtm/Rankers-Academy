services:

  db:
    image: mysql:8.0
    container_name: rankers-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Vishal@2026
      MYSQL_DATABASE: rankers_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-pVishal@2026"]
      interval: 10s
      timeout: 5s
      retries: 15


  web:
    build: .
    container_name: rankers-app
    restart: always

    depends_on:
      db:
        condition: service_healthy

    command: >
      sh -c "
      sleep 15 &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn sds_main.wsgi:application --bind 0.0.0.0:8000
      "

    ports:
      - "8081:8000"

    volumes:
      - .:/app

volumes:
  mysql_data:
