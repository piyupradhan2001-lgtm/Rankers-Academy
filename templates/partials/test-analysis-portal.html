{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ analysis_title }}</title>
    <script src="{% static 'js/admin-theme.js' %}"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/admin-theme-toggle.css' %}" />
    <link rel="stylesheet" href="{% static 'css/admin-light-overrides.css' %}" data-theme-light-link />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap");

      :root {
        --brand-a: #ff8a00;
        --brand-b: #e52e71;
        --brand-c: #7c3aed;
        --muted: #a1a1aa;
      }

      body {
        min-height: 100vh;
        color: #fafafa;
        background:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124, 58, 237, .2), transparent 60%),
          radial-gradient(ellipse 60% 50% at 100% 100%, rgba(229, 46, 113, .13), transparent 60%),
          radial-gradient(ellipse 60% 50% at 0% 100%, rgba(255, 138, 0, .1), transparent 60%),
          #06060a;
        font-family: "DM Sans", system-ui, sans-serif;
      }

      .display { font-family: "Bricolage Grotesque", system-ui, sans-serif; letter-spacing: 0; }
      .mono { font-family: "DM Mono", monospace; }
      .soft { color: var(--muted); }
      .brand-gradient { background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 52%, var(--brand-c)); }
      .brand-text {
        background: linear-gradient(135deg, #ffb55a, #f72585 50%, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .glass {
        background: rgba(7, 7, 12, .78);
        backdrop-filter: blur(18px) saturate(160%);
      }
      .btn-brand {
        --bs-btn-color: #fff;
        --bs-btn-border-color: transparent;
        --bs-btn-hover-color: #fff;
        --bs-btn-hover-border-color: transparent;
        background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 52%, var(--brand-c));
      }
      .app-shell { min-height: 100vh; }
      .sticky-head { position: sticky; top: 0; z-index: 5; }
      .hover-card {
        transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
      }
      .hover-card:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, .32) !important;
        box-shadow: 0 1rem 2rem rgba(0, 0, 0, .32) !important;
      }
      .subject-card:hover .progress-bar {
        filter: brightness(1.18);
      }
      .student-highlight {
        --bs-table-bg: rgba(13, 202, 240, .22);
        --bs-table-striped-bg: rgba(13, 202, 240, .28);
        outline: 2px solid rgba(13, 202, 240, .7);
        outline-offset: -2px;
      }
      .rank-medal {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.9rem;
        height: 1.9rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, .08);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .16);
        font-size: 1.25rem;
        line-height: 1;
      }
      .leaderboard-rank {
        width: 1%;
        white-space: nowrap;
        padding-right: .25rem !important;
      }
      .leaderboard-rank .rank-medal {
        width: 1.4rem;
        height: 1.4rem;
        margin-left: .2rem;
        background: transparent;
        box-shadow: none;
        font-size: 1rem;
      }
      .leaderboard-student {
        padding-left: .15rem !important;
      }
      .reward-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        width: 48px;
        height: 48px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 52%, var(--brand-c));
        box-shadow: 0 .5rem 1.4rem rgba(229, 46, 113, .22);
        color: #fff;
        font-size: 1.45rem;
        line-height: 1;
      }
      .rise { animation: rise .35s cubic-bezier(.2,.8,.3,1) both; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .qr-box {
        width: 144px;
        height: 144px;
        background:
          linear-gradient(90deg, #fff 10px, transparent 10px) 0 0 / 18px 18px,
          linear-gradient(#fff 10px, transparent 10px) 0 0 / 18px 18px,
          #111;
        border: 10px solid #fff;
        border-radius: .5rem;
      }
      pre.message-box {
        white-space: pre-wrap;
        font-size: .78rem;
      }
    </style>
  </head>
  <body data-page="{{ analysis_page }}">
    <main id="app"></main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const SUBJECTS = ["Physics", "Chemistry", "Biology"];
      const CLUSTER_SIZE = 12;
      const SUBJECT_THEMES = {
        Physics: { from: "#0ea5e9", to: "#06b6d4", accent: "#22d3ee", icon: "P", short: "PHY" },
        Chemistry: { from: "#d946ef", to: "#ec4899", accent: "#f472b6", icon: "C", short: "CHM" },
        Biology: { from: "#22c55e", to: "#16a34a", accent: "#4ade80", icon: "B", short: "BIO" }
      };
      const TOPICS = {
        Physics: ["Mechanics", "Thermodynamics", "Waves & Sound", "Optics", "Electrostatics", "Current Electricity", "Magnetism", "Modern Physics"],
        Chemistry: ["Atomic Structure", "Chemical Bonding", "Thermochemistry", "Equilibrium", "Organic Reactions", "Coordination Compounds", "Electrochemistry", "Periodic Table"],
        Biology: ["Cell Biology", "Genetics", "Human Physiology", "Plant Physiology", "Ecology", "Evolution", "Biotechnology", "Diversity in Living World"]
      };
      const ANALYSIS_PAYLOAD = JSON.parse('{{ test_analysis_payload|default:"{}"|escapejs }}');
      const IS_ADMIN_PAGE = document.body.dataset.page === "admin";
      const ADMIN_ANALYSIS = ANALYSIS_PAYLOAD.admin || null;
      const FACULTY_ANALYSIS = ANALYSIS_PAYLOAD.faculty || null;
      const ACTIVE_ANALYSIS = IS_ADMIN_PAGE ? ADMIN_ANALYSIS : FACULTY_ANALYSIS;
      const STUDENT_NAMES = [
        "Aarav Sharma","Vivaan Gupta","Aditya Patel","Vihaan Iyer","Arjun Reddy","Sai Kumar","Reyansh Joshi","Krishna Mehta","Ishaan Singh","Shaurya Malhotra",
        "Ananya Verma","Diya Kapoor","Aanya Rao","Saanvi Bhat","Aaradhya Nair","Kavya Pillai","Pari Desai","Riya Khanna","Anika Bose","Navya Menon",
        "Atharv Trivedi","Aarush Saxena","Dev Bhatia","Kabir Chopra","Yash Agarwal","Rudra Dube","Veer Naidu","Ayan Mishra","Aryan Tiwari","Aanav Goel",
        "Myra Bansal","Aadhya Goyal","Sara Sinha","Ira Choudhury","Tara Pandey","Kiara Sehgal","Pihu Kashyap","Avni Mahajan","Anaya Shukla","Ishita Yadav",
        "Daksh Dewan","Parth Bedi","Aaryan Bali","Rohit Anand","Karan Bajaj","Riya Sood","Tanvi Bhalla","Suhani Walia","Mahi Sethi","Naina Gera"
      ];
      const DEMO_STUDENTS = STUDENT_NAMES.map((name, i) => ({
        id: `TRA${String(i + 1).padStart(3, "0")}`,
        name,
        password: `demo${String(i + 1).padStart(3, "0")}`,
        batch: i < 25 ? "Alpha" : "Star-01",
        parentPhone: `+91 9${String(800000000 + i * 13579).slice(0, 9)}`
      }));
      const DEMO_TESTS = [
        { id: "T01", name: "Mock Test 01", date: "15 Apr 2026", shortDate: "Apr 15" },
        { id: "T02", name: "Mock Test 02", date: "22 Apr 2026", shortDate: "Apr 22" },
        { id: "T03", name: "Mock Test 03", date: "29 Apr 2026", shortDate: "Apr 29" }
      ];
      const USE_BACKEND_ANALYSIS_DATA = Boolean(ACTIVE_ANALYSIS);
      const STUDENTS = USE_BACKEND_ANALYSIS_DATA ? (ACTIVE_ANALYSIS.students || []) : DEMO_STUDENTS;
      const TESTS = USE_BACKEND_ANALYSIS_DATA ? (ACTIVE_ANALYSIS.completedTests || []) : DEMO_TESTS;
      const ADMIN_VISIBLE_COMPLETED_TESTS = TESTS.slice(-2);
      const DEFAULT_ADMIN_UPCOMING_TEST = {
        id: "",
        name: "Upcoming Test",
        date: "Awaiting schedule",
        shortDate: "Soon",
        kind: "placeholder",
        canLaunchNow: false,
        isLive: false,
      };
      const ADMIN_UPCOMING_TEST = USE_BACKEND_ANALYSIS_DATA
        ? (ACTIVE_ANALYSIS.upcomingTest || DEFAULT_ADMIN_UPCOMING_TEST)
        : DEFAULT_ADMIN_UPCOMING_TEST;
      const ADMIN_TEST_SELECTOR_SLOTS = [
        ADMIN_VISIBLE_COMPLETED_TESTS[0] || TESTS.at(-1) || null,
        ADMIN_VISIBLE_COMPLETED_TESTS[1] || ADMIN_VISIBLE_COMPLETED_TESTS[0] || TESTS.at(-1) || null,
        ADMIN_UPCOMING_TEST,
      ];
      const CLUSTER_SCHEDULE = {
        Physics: { time: "4:00 - 4:30 PM", faculty: "Mr. Rajesh Kumar", room: "Conference Room A" },
        Chemistry: { time: "4:30 - 5:00 PM", faculty: "Dr. Priya Verma", room: "Conference Room A" },
        Biology: { time: "5:00 - 5:30 PM", faculty: "Mr. Amit Sharma", room: "Conference Room A" }
      };
      const ADMIN_CREDS = { user: "admin", pwd: "admin@2026" };
      const FACULTY_CREDS = {
        physics: { user: "physics", pwd: "coach@2026", name: "Mr. Rajesh Kumar", subject: "Physics" },
        chemistry: { user: "chemistry", pwd: "coach@2026", name: "Dr. Priya Verma", subject: "Chemistry" },
        maths: { user: "maths", pwd: "coach@2026", name: "Mr. Amit Sharma", subject: "Biology" },
        biology: { user: "biology", pwd: "coach@2026", name: "Mr. Amit Sharma", subject: "Biology" }
      };
      const BADGES = [
        ["first_test", "&#127919;", "Mock Test Starter", "Completed the first academy test", "bronze"],
        ["top_25", "&#128200;", "Rank Booster", "Entered the top 25 merit band", "silver"],
        ["top_10", "&#9889;", "JEE Main Sprinter", "Cracked the top 10 in class", "gold"],
        ["top_3", "&#127942;", "NEET Podium Performer", "Reached the top 3 merit list", "gold"],
        ["rank_1", "&#128081;", "AIR Mindset Champion", "Held rank #1 on a test", "platinum"],
        ["climb_5", "&#128640;", "Comeback Climber", "Climbed 5+ ranks in one test", "silver"],
        ["streak_3", "&#128293;", "Consistency Streak", "Improved across 3 tests in a row", "gold"],
        ["subject_90", "&#127891;", "Subject Mastery Badge", "Scored 90+ in any subject", "gold"],
        ["attend_perfect", "&#9989;", "Revision Warrior", "Attended every assigned booster session", "silver"],
        ["no_cluster", "&#128142;", "Concept Clear Badge", "Stayed out of coaching clusters this test", "bronze"]
      ].map(([id, icon, name, desc, tier]) => ({ id, icon, name, desc, tier }));
      const StorageKeys = {
        attendance: (testId) => `tra4_att:${testId}`,
        facultyNotes: "tra4_fac_notes",
        parentAlerts: "tra4_parent_alerts",
        session: "tra4_session"
      };
      const ROUTES = {
        login: "{% url 'login' %}",
        student: "{% url 'login' %}",
        faculty: "{% url 'test-analysis-faculty-page' %}",
        admin: "{% url 'test-analysis-admin-page' %}"
      };
      const ANALYSIS_API = {
        attendanceStatus: "{% url 'test-analysis-attendance-status-api' %}",
        attendanceFinalize: "{% url 'test-analysis-attendance-finalize-api' %}",
        noteCreate: "{% url 'test-analysis-note-create-api' %}",
        noteDelete: "{% url 'test-analysis-note-delete-api' %}"
      };
      const ANALYSIS_DOWNLOAD_PDF_URL = "{% url 'test-analysis-download-pdf' %}";
      const SERVER_SESSION = JSON.parse('{{ test_analysis_session|escapejs }}');

      const state = {
        page: document.body.dataset.page || "login",
        user: SERVER_SESSION || getStore(StorageKeys.session, null),
        loginMode: "student",
        testId:
          (document.body.dataset.page === "admin" &&
            ((ADMIN_TEST_SELECTOR_SLOTS[1] && ADMIN_TEST_SELECTOR_SLOTS[1].id) ||
              (ADMIN_TEST_SELECTOR_SLOTS[0] && ADMIN_TEST_SELECTOR_SLOTS[0].id) ||
              TESTS.at(-1)?.id ||
              "")) ||
          TESTS.at(-1)?.id ||
          "",
        studentTab: "home",
        studentLeaderboardOpen: false,
        facultyTab: "attend",
        adminTab: "overview",
        adminSort: "total",
        adminSearch: "",
        commsTab: "post-test",
        online: navigator.onLine,
        attendance: blankAttendance(),
        facultyNotes: {},
        parentAlerts: getStore(StorageKeys.parentAlerts, {}),
        modal: ""
      };
      window.state = state;

      if (SERVER_SESSION) {
        setStore(StorageKeys.session, SERVER_SESSION);
      }

      const BACKEND_SCORES_BY_TEST = USE_BACKEND_ANALYSIS_DATA ? (ACTIVE_ANALYSIS.scoresByTest || {}) : {};
      const BACKEND_FOCUS_BY_TEST = USE_BACKEND_ANALYSIS_DATA ? (ACTIVE_ANALYSIS.focusByTest || {}) : {};
      const BACKEND_ATTENDANCE_BY_TEST = USE_BACKEND_ANALYSIS_DATA ? (ACTIVE_ANALYSIS.attendanceByTest || {}) : {};
      const BACKEND_NOTES_BY_TEST = USE_BACKEND_ANALYSIS_DATA ? (ACTIVE_ANALYSIS.notesByTest || {}) : {};
      const allScores = USE_BACKEND_ANALYSIS_DATA
        ? Object.fromEntries(
            TESTS.map((t) => [
              t.id,
              (BACKEND_SCORES_BY_TEST[t.id] || []).map((row) => ({
                studentId: row.studentId,
                testId: row.testId || t.id,
                Physics: Number(row.Physics) || 0,
                Chemistry: Number(row.Chemistry) || 0,
                Biology: Number(row.Biology ?? row.Maths) || 0,
                total: Number(row.total) || 0,
                totalMarks: Number(row.totalMarks) || 0,
                sectionScores: Array.isArray(row.sectionScores) ? row.sectionScores : [],
                rank: row.rank,
                batchRank: row.batchRank,
                attempted: row.attempted !== false,
              })),
            ])
          )
        : Object.fromEntries(TESTS.map((t) => [t.id, generateScores(t.id)]));
      const STUDENT_LOOKUP = new Map(STUDENTS.map((student) => [student.id, student]));
      const TEST_LOOKUP = new Map(
        [...TESTS, ...ADMIN_TEST_SELECTOR_SLOTS.filter(Boolean)].map((test) => [test.id, test])
      );
      const ALL_STUDENT_IDS = Array.from(
        new Set([
          ...STUDENTS.map((student) => student.id),
          ...Object.values(allScores).flatMap((scores) => scores.map((score) => score.studentId)),
        ])
      );
      const app = document.getElementById("app");

      window.addEventListener("online", () => { state.online = true; render(); });
      window.addEventListener("offline", () => { state.online = false; render(); });
      document.addEventListener("keydown", (e) => {
        if (!state.user || state.user.type !== "student" || ["INPUT", "TEXTAREA", "SELECT"].includes(e.target.tagName)) return;
        if (["1", "2", "3"].includes(e.key)) {
          state.studentTab = ["home", "analytics", "rewards"][Number(e.key) - 1];
          render();
        }
      });

      loadAttendance();
      if (!guardRoute()) render();

      function guardRoute() {
        if (!state.user) {
          if (state.page !== "login") {
            window.location.href = ROUTES.login;
            return true;
          }
          return false;
        }

        if (state.page === "login") {
          window.location.href = routeForUser(state.user);
          return true;
        }

        const expected = state.page === "teacher" ? "faculty" : state.page;
        if (state.user.type !== expected) {
          window.location.href = routeForUser(state.user);
          return true;
        }
        return false;
      }

      function routeForUser(user) {
        return ROUTES[user.type] || ROUTES.login;
      }

      function saveSession() {
        setStore(StorageKeys.session, state.user);
      }

      function clearSession() {
        localStorage.removeItem(StorageKeys.session);
      }

      function hashCode(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
        return Math.abs(h);
      }

      function generateScores(testId) {
        const testHash = hashCode(testId);
        return STUDENTS.map((s) => {
          const sh = hashCode(s.id);
          const Physics = Math.max(18, Math.min(99, (sh % 65) + 25 + ((testHash + sh) % 22) - 11));
          const Chemistry = Math.max(18, Math.min(99, ((sh * 7) % 65) + 25 + ((testHash * 3 + sh) % 22) - 11));
          const Biology = Math.max(18, Math.min(99, ((sh * 13) % 65) + 25 + ((testHash * 5 + sh) % 22) - 11));
          return { studentId: s.id, testId, Physics, Chemistry, Biology, total: Physics + Chemistry + Biology };
        });
      }

      function generateTopicMastery(studentId, testId, subject) {
        const backendTopics = BACKEND_FOCUS_BY_TEST[testId]?.[studentId];
        if (Array.isArray(backendTopics) && backendTopics.length) {
          return backendTopics.map((item) => ({
            topic: item.topic || `${subject} focus`,
            score: Number(item.score) || 0,
          }));
        }
        return TOPICS[subject].map((topic, i) => {
          const score = (hashCode(studentId) + hashCode(testId) + hashCode(subject) + hashCode(topic) + i * 7) % 100;
          return { topic, score: Math.max(15, Math.min(98, score)) };
        });
      }

      function getRankings(scores, key = "total") {
        const parsedRank = (value) => {
          const rank = Number.parseInt(value, 10);
          return Number.isInteger(rank) ? rank : Number.MAX_SAFE_INTEGER;
        };
        const useBackendRanks = key === "total" && scores.some((score) => score?.rank !== undefined);
        return [...scores]
          .sort((a, b) => {
            const attemptedA = a?.attempted !== false;
            const attemptedB = b?.attempted !== false;
            if (attemptedA !== attemptedB) {
              return attemptedA ? -1 : 1;
            }

            const scoreDiff = (Number(b?.[key]) || 0) - (Number(a?.[key]) || 0);
            if (scoreDiff) {
              return scoreDiff;
            }

            const rankDiff = parsedRank(a?.rank) - parsedRank(b?.rank);
            if (rankDiff) {
              return rankDiff;
            }

            return String(a?.studentId || "").localeCompare(String(b?.studentId || ""));
          })
          .map((s, i) => ({
            ...s,
            rank: useBackendRanks
              ? (s?.attempted === false ? "NA" : (s?.rank ?? i + 1))
              : (s?.attempted === false ? "NA" : i + 1),
          }));
      }

      function getBottomCluster(scores, subject, count = CLUSTER_SIZE) {
        return [...scores].sort((a, b) => a[subject] - b[subject]).slice(0, count);
      }

      function getStudentClusterFlags(studentId, scores) {
        return Object.fromEntries(SUBJECTS.map((sub) => [sub, getBottomCluster(scores, sub).some((s) => s.studentId === studentId)]));
      }

      function calculateXP(studentId) {
        let xp = 0;
        TESTS.forEach((t, ti) => {
          const scores = allScores[t.id] || [];
          const me = scores.find((s) => s.studentId === studentId);
          const rankEntry = getRankings(scores).find((s) => s.studentId === studentId);
          if (!me || !rankEntry) return;
          const rank = rankEntry.rank;
          xp += Math.floor(me.total / 3);
          xp += rank === 1 ? 200 : rank <= 3 ? 120 : rank <= 10 ? 60 : rank <= 25 ? 25 : 0;
          if (ti) {
            const prevEntry = getRankings(allScores[TESTS[ti - 1].id] || []).find((s) => s.studentId === studentId);
            if (prevEntry && prevEntry.rank > rank) xp += (prevEntry.rank - rank) * 10;
          }
        });
        const level = Math.floor(Math.sqrt(xp / 30)) + 1;
        const nextLevelXP = level * level * 30;
        const prevLevelXP = (level - 1) * (level - 1) * 30;
        return { xp, level, progress: (xp - prevLevelXP) / (nextLevelXP - prevLevelXP) };
      }

      function getEarnedBadges(studentId) {
        const earned = new Set(["first_test"]);
        let bestRank = 999, ever90 = false, climbedFive = false, streak = 0;
        TESTS.forEach((t, i) => {
          const scores = allScores[t.id] || [], me = scores.find((s) => s.studentId === studentId);
          const rankEntry = getRankings(scores).find((s) => s.studentId === studentId);
          if (!me || !rankEntry) return;
          const rank = rankEntry.rank;
          bestRank = Math.min(bestRank, rank);
          ever90 ||= me.Physics >= 90 || me.Chemistry >= 90 || me.Biology >= 90;
          if (i) {
            const prevEntry = getRankings(allScores[TESTS[i - 1].id] || []).find((s) => s.studentId === studentId);
            if (prevEntry) {
              if (prevEntry.rank - rank >= 5) climbedFive = true;
              streak = prevEntry.rank > rank ? streak + 1 : 0;
            }
          }
        });
        if (bestRank <= 25) earned.add("top_25");
        if (bestRank <= 10) earned.add("top_10");
        if (bestRank <= 3) earned.add("top_3");
        if (bestRank === 1) earned.add("rank_1");
        if (climbedFive) earned.add("climb_5");
        if (streak >= 2) earned.add("streak_3");
        if (ever90) earned.add("subject_90");
        const latestTestId = TESTS.at(-1)?.id;
        const flags = latestTestId ? getStudentClusterFlags(studentId, allScores[latestTestId] || []) : {};
        const flagged = SUBJECTS.filter((s) => flags[s]);
        if (!flagged.length) earned.add("no_cluster");
        if (flagged.length && flagged.every((s) => ["present", "late"].includes(state.attendance[s]?.[studentId]))) earned.add("attend_perfect");
        return earned;
      }

      function calculateStreaks(studentId) {
        let improveStreak = 0;
        for (let i = TESTS.length - 1; i > 0; i--) {
          const curEntry = getRankings(allScores[TESTS[i].id] || []).find((s) => s.studentId === studentId);
          const prevEntry = getRankings(allScores[TESTS[i - 1].id] || []).find((s) => s.studentId === studentId);
          if (!curEntry || !prevEntry) break;
          const cur = curEntry.rank;
          const prev = prevEntry.rank;
          if (prev > cur) improveStreak++;
          else break;
        }
        return { improveStreak };
      }

      function getPredictiveAlerts() {
        const alerts = [];
        ALL_STUDENT_IDS.forEach((studentId) => {
          const stu = getStudentById(studentId) || { id: studentId, name: studentId, parentPhone: "", batch: "" };
          const reasons = [];
          let severity = 0;
          const ranks = TESTS.map((t) => {
            const rankEntry = getRankings(allScores[t.id] || []).find((s) => s.studentId === studentId);
            return rankEntry ? rankEntry.rank : null;
          });
          const recentRanks = ranks.filter((rank) => Number.isInteger(rank));
          if (!recentRanks.length) return;
          if (recentRanks.length >= 2) {
            const drop = recentRanks.at(-1) - recentRanks.at(-2);
            if (drop >= 8) { reasons.push(`Dropped ${drop} ranks vs last test`); severity += 3; }
            else if (drop >= 4) { reasons.push(`Dropped ${drop} ranks vs last test`); severity += 1; }
          }
          if (TESTS.length && TESTS.every((t, index) => {
            const totalStudents = (allScores[t.id] || []).length;
            const rank = ranks[index];
            return totalStudents > 0 && rank !== null && rank > Math.max(0, totalStudents - 15);
          })) { reasons.push("Bottom-15 in all tests"); severity += 2; }
          const clusterCount = TESTS.reduce((n, t) => {
            const testScores = allScores[t.id] || [];
            if (!testScores.some((score) => score.studentId === studentId)) return n;
            return n + Object.values(getStudentClusterFlags(studentId, testScores)).filter(Boolean).length;
          }, 0);
          if (clusterCount >= 6) { reasons.push(`In ${clusterCount} subject clusters across ${TESTS.length} tests`); severity += 2; }
          let absent = 0, marked = 0;
          SUBJECTS.forEach((sub) => {
            const status = state.attendance[sub]?.[studentId];
            if (status) marked++;
            if (status === "absent") absent++;
          });
          if (marked && absent / marked >= .5) { reasons.push(`${absent}/${marked} sessions absent`); severity += 2; }
          if (reasons.length) alerts.push({ ...stu, reasons, severity, ranks: ranks.map((rank) => rank ?? "NA") });
        });
        return alerts.sort((a, b) => b.severity - a.severity);
      }

          },
          credentials: "same-origin",

        return data;
      }
      function esc(v) { return String(v ?? "").replace(/[&<>\"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c])); }

        if (!score) {
          return { studentId: "", id: "", name: "", batch: "", parentPhone: "", studentRef: "", displayId: "" };
        }
        const student = getStudentById(score.studentId) || {
          id: score.studentId,

      function analysisTotalMarks(score = null) {
        const scoreTotal = Number(score?.totalMarks);
        if (Number.isFinite(scoreTotal) && scoreTotal > 0) return scoreTotal;

        const testTotal = Number(currentTest()?.totalMarks);
        if (Number.isFinite(testTotal) && testTotal > 0) return testTotal;

        const rowTotal = currentScores()
          .map((item) => Number(item?.totalMarks) || 0)
          .find((value) => value > 0);

      }
      function analysisSectionMeta(score, subject) {
        const sectionScores = score?.sectionScores || [];
        const normalized = String(subject || "").trim().toLowerCase();
        const matched = sectionScores.find((section) => {
          const raw = String(section?.sectionName || section?.name || "").trim().toLowerCase();
          return raw === normalized || raw.includes(normalized);
        });
        if (matched) {
          return {
            score: Number(matched.score) || 0,
            total: Number(matched.total) || 0,
          };
        }
        const fallbackScore = Number(score?.[subject]) || 0;
        return { score: fallbackScore, total: 0 };
      }
      function findClusterStudentIdByInput(subject, rawInput) {

          .find((student) =>
            String(student.studentId || "").toLowerCase() === normalized
            || String(student.id || "").toLowerCase() === normalized
            || String(student.studentRef || "").toLowerCase() === normalized
            || String(student.displayId || "").toLowerCase() === normalized

      }

      function leaderboard(ranked, highlightId = "", collapsible = false) {
        const rows = leaderboardRows(ranked, highlightId, collapsible && !state.studentLeaderboardOpen);
        const footer = collapsible ? `<div class="d-flex justify-content-between align-items-center mt-3">
          <div class="small soft">${state.studentLeaderboardOpen ? `Showing all ${ranked.length} students` : `Showing top 5${rows.length > 5 ? " + your rank" : ""}`}</div>
          <button class="btn btn-outline-light btn-sm rounded-pill" onclick="toggleStudentLeaderboard()">${state.studentLeaderboardOpen ? "Show Less" : "View All"}</button>
        </div>` : "";
        return card("p-3 mb-4", `<div class="d-flex justify-content-between align-items-center mb-2"><h5 class="display fw-bold mb-0">Leaderboard</h5>${collapsible ? badge(`${ranked.length} students`, "text-bg-info") : ""}</div><div class="table-responsive"><table class="table table-sm table-dark table-striped table-hover align-middle mb-0"><thead><tr><th>#</th><th>Student</th><th>PHY</th><th>CHM</th><th>BIO</th><th>TOTAL SCORE</th><th>BATCH RANKING</th><th>INSTITUTE RANKING</th></tr></thead><tbody>${rows.map((r) => {
          const stu = scoreStudent(r);
          const mine = stu.id === highlightId;
          const batchRank = getBatchRank(r);
          return `<tr class="${mine ? "table-active student-highlight" : ""}"><td class="mono leaderboard-rank"><span>${formatRankValue(r.rank)}</span>${Number.isInteger(Number.parseInt(r.rank, 10)) ? rankMedal(Number.parseInt(r.rank, 10)) : ""}</td><td class="leaderboard-student"><div class="d-flex align-items-center gap-2">${avatar(stu.name, 28)}<div class="overflow-hidden"><span class="fw-semibold">${esc(stu.name)}</span>${mine ? ` ${badge("You", "text-bg-info")}` : ""}<div class="small soft mono">${esc(displayStudentId(stu))}${stu.batch ? ` - ${esc(stu.batch)}` : ""}</div></div></div></td><td>${r.Physics}</td><td>${r.Chemistry}</td><td>${r.Biology}</td><td><b>${r.total}${analysisTotalMarks(r) ? `/${analysisTotalMarks(r)}` : ""}</b></td><td>${batchRank === "NA" ? "NA" : `#${batchRank}`}</td><td>${formatRankValue(r.rank)}</td></tr>`;
        }).join("")}</tbody></table></div>${footer}`);
      }

      function studentAnalytics(student, score) {
        const ranks = TESTS.map((t) => getRankings(allScores[t.id]).find((s) => s.studentId === student.id).rank);
        return `${card("p-4 mb-4", `<h5 class="display fw-bold">Rank Journey</h5><div class="row g-2">${TESTS.map((t, i) => kpi(t.shortDate, `#${ranks[i]}`, i ? `${ranks[i - 1] - ranks[i] >= 0 ? "Up" : "Down"} ${Math.abs(ranks[i - 1] - ranks[i])}` : "Baseline")).join("")}</div>`)}
        <h5 class="display fw-bold">Topic Analytics</h5>
        <div class="vstack gap-3 mb-4">${SUBJECTS.map((sub) => {
          const t = SUBJECT_THEMES[sub];
          return card("p-3", `<div class="d-flex align-items-center justify-content-between mb-2"><div class="d-flex align-items-center gap-2">${subjectIcon(sub)}<div><b style="color:${t.accent}">${sub}</b><div class="small soft">Topic-wise mastery</div></div></div><span class="mono">${score[sub]}/100</span></div>${generateTopicMastery(student.id, state.testId, sub).map((x) => `<div class="mt-2"><div class="d-flex justify-content-between small"><span>${esc(x.topic)}</span><span class="soft">${x.score}%</span></div>${progress(x.score, t.accent)}</div>`).join("")}`);
        }).join("")}</div>`;
      }

      function studentRewards(student, xp) {
        const earned = getEarnedBadges(student.id);
        const streak = calculateStreaks(student.id).improveStreak;
        return `${card("p-4 mb-4", `<div class="d-flex justify-content-between"><div><h5 class="display fw-bold">Level ${xp.level}</h5><div class="soft small">${xp.xp} XP earned</div></div>${badge(`${streak} TEST STREAK`, "text-bg-warning text-dark")}</div><div class="mt-3">${progress(Math.round(xp.progress * 100), "linear-gradient(135deg,#ff8a00,#e52e71,#7c3aed)")}</div>`)}
        <div class="row g-3">${BADGES.map((b) => `<div class="col-md-6">${card(`p-3 h-100 ${earned.has(b.id) ? "" : "opacity-50"}`, `<div class="d-flex gap-3"><div class="reward-icon">${b.icon}</div><div><b>${b.name}</b><div class="small soft">${b.desc}</div><div class="small mono soft text-uppercase">${earned.has(b.id) ? "earned" : "locked"} - ${b.tier}</div></div></div>`)}</div>`).join("")}</div>`;
      }

      function facultyView() {
        const faculty = state.user.faculty, subject = faculty.subject;
        return `<div class="app-shell pb-5"><div class="container-fluid px-3 px-lg-4">
          ${nav([["attend","Attendance"],["topics","Topic Focus"],["notes","Notes"]], state.facultyTab, "state.facultyTab")}
          ${testSelector()}
          ${state.facultyTab === "attend" ? facultyAttendance(subject) : state.facultyTab === "topics" ? facultyTopics(subject) : facultyNotes(subject)}
        </div></div>`;
      }

      function facultyAttendance(subject) {
        const cluster = getBottomCluster(currentScores(), subject).map(scoreStudent);
        const att = state.attendance[subject] || {};
        const counts = ["present", "late", "absent"].map((x) => Object.values(att).filter((s) => s === x).length);
        const marked = counts.reduce((a, b) => a + b, 0);
        const finalized = !!state.attendance.finalized?.[subject];
        const allThree = getAllThreeSet(currentScores());
        return `${card("p-4 mb-4", `${badge("Tonight's Session", "text-bg-primary")}<h2 class="display fw-bold mt-2">${subject} Revision</h2><div class="soft small mono">${CLUSTER_SCHEDULE[subject].time} - ${CLUSTER_SCHEDULE[subject].room} - ${cluster.length} students</div><div class="row g-2 mt-3">${kpi("Present", counts[0], "marked")}${kpi("Late", counts[1], "marked")}${kpi("Absent", counts[2], "marked")}</div><div class="mt-3">${progress(Math.round(marked / cluster.length * 100), SUBJECT_THEMES[subject].accent)}</div><div class="d-flex gap-2 flex-wrap mt-3"><button class="btn btn-outline-light" ${finalized ? "disabled" : ""} onclick="openQR('${subject}')">Scan QR</button>${finalized ? `${badge("Finalized", "text-bg-success")}<button class="btn btn-outline-light btn-sm" onclick="resetAttendance('${subject}')">Re-open</button>` : `<button class="btn btn-brand flex-grow-1" onclick="finalizeAttendance('${subject}')">Finalize and auto-mark rest absent</button>`}</div>`)}
        <h5 class="display fw-bold">Mark Attendance</h5><div class="vstack gap-2 mb-4">${cluster.map((s, i) => attendanceRow(s, i, att[s.studentId] || "pending", allThree.has(s.studentId), finalized, subject)).join("")}</div>`;
      }

      function attendanceRow(s, i, status, allThree, disabled, subject) {
        const btnClass = (x) => status !== x ? "btn-outline-light" : x === "present" ? "btn-success" : x === "late" ? "btn-warning" : "btn-danger";
        return card("p-2 d-flex flex-row align-items-center gap-2", `<span class="mono soft text-center" style="width:26px">${i + 1}</span>${avatar(s.name, 34)}<div class="flex-grow-1 overflow-hidden"><b class="text-truncate d-block">${esc(s.name)}</b><div class="small soft mono">${esc(displayStudentId(s))} ${allThree ? "- all subjects" : ""}</div></div>${["present","late","absent"].map((x) => `<button class="btn btn-sm ${btnClass(x)}" ${disabled ? "disabled" : ""} onclick="setAttendanceStatus('${subject}','${s.studentId}','${x}')">${x}</button>`).join("")}`);
      }

      function getAllThreeSet(scores) {
        const clusters = Object.fromEntries(SUBJECTS.map((sub) => [sub, getBottomCluster(scores, sub).map((s) => s.studentId)]));
        return new Set(STUDENTS.filter((s) => SUBJECTS.every((sub) => clusters[sub].includes(s.id))).map((s) => s.id));
      }

      async function setAttendanceStatus(subject, studentId, status) {
        if (state.attendance.finalized?.[subject]) return;
        if (USE_BACKEND_ANALYSIS_DATA && state.user?.type === "faculty") {
          try {
            await postAnalysisJson(ANALYSIS_API.attendanceStatus, {
              test_id: currentBackendTestId(),
              subject,
              student_id: studentId,
              status,
            });
          } catch (error) {
            window.alert(error.message || "Unable to save attendance.");
            return;
          }
        }
        state.attendance[subject] = { ...(state.attendance[subject] || {}), [studentId]: status };
        saveAttendance();
        render();
      }

      async function finalizeAttendance(subject) {
        if (USE_BACKEND_ANALYSIS_DATA && state.user?.type === "faculty") {
          try {
            await postAnalysisJson(ANALYSIS_API.attendanceFinalize, {
              test_id: currentBackendTestId(),
              subject,
              finalized: true,
            });
          } catch (error) {
            window.alert(error.message || "Unable to finalize attendance.");
            return;
          }
        }
        const subj = { ...(state.attendance[subject] || {}) };
        getBottomCluster(currentScores(), subject).forEach((s) => {
          if (!subj[s.studentId]) subj[s.studentId] = "absent";
        });
        state.attendance[subject] = subj;
        state.attendance.finalized = { ...(state.attendance.finalized || {}), [subject]: true };
        saveAttendance();
        render();
      }

      async function resetAttendance(subject) {
        if (USE_BACKEND_ANALYSIS_DATA && state.user?.type === "faculty") {
          try {
            await postAnalysisJson(ANALYSIS_API.attendanceFinalize, {
              test_id: currentBackendTestId(),
              subject,
              finalized: false,
            });
          } catch (error) {
            window.alert(error.message || "Unable to reopen attendance.");
            return;
          }
        }
        state.attendance[subject] = {};
        state.attendance.finalized = { ...(state.attendance.finalized || {}), [subject]: false };
        saveAttendance();
        render();
      }

      function openQR(subject) {
        state.modal = `<div class="modal d-block" tabindex="-1" style="background:rgba(0,0,0,.72)"><div class="modal-dialog modal-dialog-centered"><div class="modal-content bg-dark text-white border-secondary"><div class="modal-header"><h5 class="modal-title">QR Attendance - ${subject}</h5><button class="btn-close btn-close-white" onclick="closeModal()"></button></div><div class="modal-body text-center"><div class="qr-box mx-auto mb-3"></div><p class="soft small">Type a student ID from this cluster and mark present.</p><div class="input-group"><input id="qr-input" class="form-control" placeholder="TRA001" onkeydown="if(event.key==='Enter') markQR('${subject}')"><button class="btn btn-brand" onclick="markQR('${subject}')">Mark</button></div></div></div></div></div>`;
        render(); setTimeout(() => document.getElementById("qr-input")?.focus(), 0);
      }

      async function markQR(subject) {
        const studentId = findClusterStudentIdByInput(subject, document.getElementById("qr-input").value);
        if (studentId) {
          await setAttendanceStatus(subject, studentId, "present");
        }
        state.modal = "";
        render();
      }

      function closeModal() { state.modal = ""; render(); }

      function facultyTopics(subject) {
        const cluster = getBottomCluster(currentScores(), subject).map(scoreStudent);
        return card("p-4 mb-4", `<h5 class="display fw-bold">${subject} Topic Focus</h5>${cluster.map((s) => mini("p-3 mb-2", `<div class="d-flex align-items-center gap-2 mb-2">${avatar(s.name, 32)}<div><b>${esc(s.name)}</b><div class="small soft mono">${esc(displayStudentId(s))} - score ${s[subject]}</div></div></div>${generateTopicMastery(s.studentId, state.testId, subject).sort((a,b) => a.score - b.score).slice(0,4).map((x) => `<div class="mt-2"><div class="d-flex justify-content-between small"><span>${esc(x.topic)}</span><span>${x.score}%</span></div>${progress(x.score, SUBJECT_THEMES[subject].accent)}</div>`).join("")}`)).join("")}`);
      }

      function facultyNotes(subject) {
        const cluster = getBottomCluster(currentScores(), subject).map(scoreStudent);
        return card("p-4 mb-4", `<h5 class="display fw-bold">Faculty Notes</h5>${cluster.map((s) => {
          const key = noteStateKey(s.studentId, subject), notes = state.facultyNotes[key] || [];
          return mini("p-3 mb-2", `<div class="d-flex align-items-center gap-2">${avatar(s.name, 32)}<div class="flex-grow-1"><b>${esc(s.name)}</b><div class="small soft mono">${esc(displayStudentId(s))}</div></div></div><div class="input-group input-group-sm my-2"><input id="note-${key}" class="form-control" placeholder="Add a note"><button class="btn btn-brand" onclick="addNote('${key}')">Add</button></div>${notes.map((n) => `<div class="small soft border-top border-secondary border-opacity-25 py-1 d-flex justify-content-between"><span>${esc(n.text)}</span><button class="btn btn-sm btn-link text-danger p-0" onclick="deleteNote('${key}','${n.id}')">x</button></div>`).join("")}`);
        }).join("")}`);
      }

      async function addNote(key) {
        const text = document.getElementById(`note-${key}`).value.trim();
        if (!text) return;
        let note = { id: Date.now().toString(), text, at: new Date().toISOString() };
        if (USE_BACKEND_ANALYSIS_DATA && state.user?.type === "faculty") {
          const parsed = parseNoteStateKey(key);
          try {
            const response = await postAnalysisJson(ANALYSIS_API.noteCreate, {
              test_id: currentBackendTestId(),
              subject: parsed.subject,
              student_id: parsed.studentId,
              text,
            });
            note = response.note || note;
          } catch (error) {
            window.alert(error.message || "Unable to save note.");
            return;
          }
        }
        state.facultyNotes[key] = [note, ...(state.facultyNotes[key] || [])];
        saveAttendance();
        render();
      }

      async function deleteNote(key, id) {
        if (USE_BACKEND_ANALYSIS_DATA && state.user?.type === "faculty") {
          try {
            await postAnalysisJson(ANALYSIS_API.noteDelete, {
              note_id: id,
            });
          } catch (error) {
            window.alert(error.message || "Unable to delete note.");
            return;
          }
        }
        state.facultyNotes[key] = (state.facultyNotes[key] || []).filter((n) => n.id !== id);
        saveAttendance();
        render();
      }

      function adminView() {
        const tabs = [["overview","Overview"],["predict","At Risk"],["students","Students"],["clusters","Clusters"],["attend","Attendance"],["comms","Comms"]];
        const current = currentTest();
        const canExport = Boolean(current && current.id);
        return `<div class="app-shell pb-5"><div class="container-fluid px-3 px-lg-4">
          <div class="d-flex justify-content-between align-items-start gap-2">${adminTestSelector()}
            <div class="pt-1">
              <button class="btn btn-brand btn-sm rounded-pill fw-bold" ${canExport ? "" : "disabled"} onclick="downloadAnalysisPdf()">
                <i class="bi bi-file-earmark-arrow-down me-1"></i> Download PDF
              </button>
            </div>
          </div>
          <div class="d-flex gap-2 overflow-auto pb-1 mb-4">${tabs.map(([id,label]) => `<button class="btn btn-sm ${state.adminTab === id ? "btn-light" : "btn-outline-light"} rounded-pill fw-bold flex-shrink-0" onclick="state.adminTab='${id}';render()">${label}</button>`).join("")}</div>
          ${state.adminTab === "overview" ? adminOverview() : state.adminTab === "predict" ? adminPredict() : state.adminTab === "students" ? adminStudents() : state.adminTab === "clusters" ? adminClusters() : state.adminTab === "attend" ? adminAttendance() : parentComms()}
        </div></div>`;
      }

      function downloadAnalysisPdf() {
        const test = currentTest();
        if (!test || !test.id) {
          window.alert("Please select a completed test first.");
          return;
        }
        const url = `${ANALYSIS_DOWNLOAD_PDF_URL}?test_id=${encodeURIComponent(test.id)}`;
        window.open(url, "_blank");
      }

      function adminOverview() {
        const scores = currentScores();
        const ranked = getRankings(scores);
        const participantCount = scores.length;
        const avg = participantCount ? Math.round(scores.reduce((n, s) => n + s.total, 0) / participantCount) : 0;
        const topStudent = ranked[0] ? scoreStudent(ranked[0]).name : "No attempts yet";
        return `<div class="row g-3 mb-4">${kpi("Class Average", `${avg}/${analysisTotalMarks()}`, currentTest().name)}${kpi("Top Score", `${ranked[0]?.total || 0}${analysisTotalMarks(ranked[0]) ? `/${analysisTotalMarks(ranked[0])}` : ""}`, topStudent)}${kpi("All-Subject Cluster", getAllThreeSet(scores).size, "students")}${kpi("At-Risk Alerts", getPredictiveAlerts().length, "predictive warnings")}</div>
        ${card("p-4 mb-4", `<h5 class="display fw-bold">Subject Averages</h5><div class="row g-3">${SUBJECTS.map((sub) => {
          const avgSub = participantCount ? Math.round(scores.reduce((n, s) => n + s[sub], 0) / participantCount) : 0;
          const sectionTotal = analysisSectionMeta(scores.find((item) => item?.sectionScores?.length), sub).total || 0;
          return `<div class="col-md-4">${mini("p-3", `${subjectIcon(sub)}<b class="ms-2">${sub}</b><div class="display fs-3 fw-bold mt-2">${avgSub}${sectionTotal ? `/${sectionTotal}` : ""}</div>${progress(sectionTotal ? Math.round((avgSub / sectionTotal) * 100) : avgSub, SUBJECT_THEMES[sub].accent)}`)}</div>`;
        }).join("")}</div>`)}${leaderboard(ranked.slice(0, 10))}`;
      }

      function adminPredict() {
        const alerts = getPredictiveAlerts();
        return card("p-4 mb-4", `<h5 class="display fw-bold">Predictive Alerts</h5><div class="vstack gap-2">${alerts.map((a) => {
          const notes = SUBJECTS.flatMap((sub) => state.facultyNotes[noteStateKey(a.id, sub)] || []);
          return mini("p-3", `<div class="d-flex align-items-start gap-3">${avatar(a.name, 38)}<div class="flex-grow-1"><div class="d-flex justify-content-between"><b>${esc(a.name)}</b>${badge(`S${a.severity}`, a.severity >= 4 ? "text-bg-danger" : "text-bg-warning text-dark")}</div><div class="small soft mono">${esc(a.studentRef || a.id)} - ranks ${a.ranks.join(" -> ")}</div><ul class="small soft mb-1 mt-2">${a.reasons.map((r) => `<li>${esc(r)}</li>`).join("")}</ul>${notes.length ? `<div class="small text-info">Faculty notes: ${notes.map((n) => esc(n.text)).join("; ")}</div>` : ""}</div></div>`);
        }).join("") || `<div class="soft small">No active risk alerts.</div>`}</div>`);
      }

      function adminStudents() {
        const q = state.adminSearch.toLowerCase();
        const ranked = getRankings(currentScores(), state.adminSort).map(scoreStudent).filter((s) => !q || s.name.toLowerCase().includes(q) || String(s.id || s.studentRef || "").toLowerCase().includes(q));
        return card("p-3 mb-4", `<div class="row g-2 mb-3"><div class="col-md"><input class="form-control" value="${esc(state.adminSearch)}" placeholder="Search name or ID" oninput="state.adminSearch=this.value;render()"></div><div class="col-md-auto"><select class="form-select" onchange="state.adminSort=this.value;render()">${["total","Physics","Chemistry","Biology"].map((k) => `<option ${state.adminSort === k ? "selected" : ""} value="${k}">${k}</option>`).join("")}</select></div></div>${leaderboard(ranked)}`);
      }

      function adminClusters() {
        const sc = currentScores(), allThree = getAllThreeSet(sc), notice = buildNotice(sc);
        const schedule = card("p-4 mb-4", `<h5 class="display fw-bold">Cluster Schedule</h5><div class="row g-2">${SUBJECTS.map((sub) => `<div class="col-md-4">${mini("p-3", `${subjectIcon(sub)}<b class="ms-2">${sub}</b><div class="small soft mt-2">${CLUSTER_SCHEDULE[sub].faculty}<br>${CLUSTER_SCHEDULE[sub].time}</div>`)}</div>`).join("")}</div>`);
        const allSubjectBlock = allThree.size ? card("p-4 mb-4", `<h5 class="display fw-bold">All-Subjects Cluster</h5>${[...allThree].map((id) => {
          const s = scoreStudent(sc.find((x) => x.studentId === id));
          return mini("p-2 mb-2 d-flex flex-row align-items-center gap-2", `${avatar(s.name, 30)}<div class="flex-grow-1"><b>${esc(s.name)}</b><div class="small soft mono">${esc(displayStudentId(s))}</div></div><span class="mono small">P${s.Physics} C${s.Chemistry} B${s.Biology}</span>`);
        }).join("")}`) : "";
        const subjectBlocks = SUBJECTS.map((sub) => {
          const rows = getBottomCluster(sc, sub)
            .filter((s) => !allThree.has(s.studentId))
            .map(scoreStudent)
            .map((s, i) => mini("p-2 mb-2 d-flex flex-row align-items-center gap-2", `<span class="mono soft">${i + 1}</span>${avatar(s.name, 28)}<div class="flex-grow-1 text-truncate"><b>${esc(s.name)}</b><div class="small soft mono">${esc(displayStudentId(s))}</div></div><b style="color:${SUBJECT_THEMES[sub].accent}">${s[sub]}</b>`))
            .join("") || `<div class="small soft">All weak ${sub} students are in the all-subjects group.</div>`;
          return `<div class="col-lg-4">${card("p-3 h-100", `<h6 class="display fw-bold">${sub} Cluster</h6>${rows}`)}</div>`;
        }).join("");
        const noticeBlock = card("p-4 my-4", `<div class="d-flex justify-content-between"><h5 class="display fw-bold">Faculty Notice</h5><button class="btn btn-outline-light btn-sm" onclick="navigator.clipboard?.writeText(document.getElementById('notice').innerText)">Copy</button></div><pre id="notice" class="message-box bg-black bg-opacity-25 border border-secondary border-opacity-25 rounded-3 p-3 mono">${esc(notice)}</pre>`);
        return `${schedule}${allSubjectBlock}<div class="row g-3">${subjectBlocks}</div>${noticeBlock}`;
      }

      function buildNotice(sc) {
        const lines = [`The Rankers Academy - ${currentTest().name}`, `Cluster sessions for ${currentTest().date}`, ""];
        SUBJECTS.forEach((sub) => {
          lines.push(`${sub} (${CLUSTER_SCHEDULE[sub].time}) - ${CLUSTER_SCHEDULE[sub].faculty}`);
          getBottomCluster(sc, sub).map(scoreStudent).forEach((s, i) => lines.push(`${i + 1}. ${s.name} (${displayStudentId(s)}) - ${s[sub]}/100`));
          lines.push("");
        });
        return lines.join("\n");
      }

      function adminAttendance() {
        return card("p-4 mb-4", `<h5 class="display fw-bold">Attendance Records</h5>${SUBJECTS.map((sub) => {
          const cluster = getBottomCluster(currentScores(), sub), att = state.attendance[sub] || {};
          const present = cluster.filter((s) => ["present", "late"].includes(att[s.studentId])).length;
          const rate = cluster.length ? Math.round(present / cluster.length * 100) : 0;
          const absent = cluster.map(scoreStudent).filter((s) => att[s.studentId] === "absent");
          return mini("p-3 mb-3", `<div class="d-flex justify-content-between align-items-center"><div>${subjectIcon(sub)}<b class="ms-2">${sub}</b><div class="small soft">${CLUSTER_SCHEDULE[sub].time}</div></div>${badge(`${rate}%`, rate >= 80 ? "text-bg-success" : rate >= 50 ? "text-bg-warning text-dark" : "text-bg-danger")}</div><div class="mt-2">${progress(rate, SUBJECT_THEMES[sub].accent)}</div>${absent.length ? `<div class="small text-danger mt-2">Absentees: ${absent.map((s) => `${esc(s.name)} (${esc(displayStudentId(s))})`).join(", ")}</div>` : ""}`);
        }).join("")}`);
      }

      function parentComms() {
        const messages = state.commsTab === "post-test" ? postTestMessages() : absenceMessages();
        const sent = messages.filter((m) => state.parentAlerts[msgId(m)]).length;
        return `${card("p-4 mb-4", `<div class="d-flex align-items-center gap-3"><div class="d-inline-flex align-items-center justify-content-center rounded-circle text-white fw-bold brand-gradient" style="width:48px;height:48px">PA</div><div><h5 class="display fw-bold mb-0">Parent Communications</h5><div class="small soft">Auto-drafted WhatsApp/SMS - review before sending</div></div></div><div class="row g-2 mt-3"><div class="col"><button class="card bg-black bg-opacity-25 border-secondary rounded-3 p-3 w-100 text-start text-white ${state.commsTab === "post-test" ? "border-light" : ""}" onclick="state.commsTab='post-test';render()"><div class="small soft text-uppercase fw-bold">Post-Test Reports</div><b>${postTestMessages().length} drafts</b></button></div><div class="col"><button class="card bg-black bg-opacity-25 border-secondary rounded-3 p-3 w-100 text-start text-white ${state.commsTab === "absences" ? "border-light" : ""}" onclick="state.commsTab='absences';render()"><div class="small soft text-uppercase fw-bold">Absence Alerts</div><b>${absenceMessages().length} drafts</b></button></div></div><div class="d-flex justify-content-between align-items-center mt-3 small soft"><span>${sent}/${messages.length} sent - ${messages.length - sent} queued</span><button class="btn btn-brand btn-sm" onclick="sendAllMessages()" ${messages.length ? "" : "disabled"}>Send all queued</button></div>`)}
        <div class="vstack gap-2">${messages.map(messageCard).join("") || card("p-4 text-center soft", "No drafts yet.")}</div>`;
      }

      function postTestMessages() {
        const ranked = getRankings(currentScores());
        return currentScores().map(scoreStudent).map((stu) => {
          const me = currentScores().find((s) => s.studentId === stu.id);
          const rankEntry = ranked.find((s) => s.studentId === stu.id);
          if (!me || !rankEntry) return null;
          const rank = rankEntry.rank;
          const flagged = SUBJECTS.filter((s) => getStudentClusterFlags(stu.id, currentScores())[s]);
          const tone = rank <= 10 ? "Celebrate" : rank <= 25 ? "Positive" : flagged.length === 3 ? "Concerned" : "Support";
          let body = `Dear Parent,\n\n${stu.name} appeared in ${currentTest().name} (${currentTest().date}) at The Rankers Academy.\n\nTotal: ${me.total}/${analysisTotalMarks(me)} - Rank: ${formatRankValue(rank)} of ${currentScores().length}\nPhysics: ${analysisSectionMeta(me, "Physics").score}${analysisSectionMeta(me, "Physics").total ? `/${analysisSectionMeta(me, "Physics").total}` : ""} - Chemistry: ${analysisSectionMeta(me, "Chemistry").score}${analysisSectionMeta(me, "Chemistry").total ? `/${analysisSectionMeta(me, "Chemistry").total}` : ""} - Biology: ${analysisSectionMeta(me, "Biology").score}${analysisSectionMeta(me, "Biology").total ? `/${analysisSectionMeta(me, "Biology").total}` : ""}\n\n`;
          body += tone === "Celebrate" ? `Outstanding performance. ${stu.name.split(" ")[0]} cracked the top 10. Congratulations!` : tone === "Positive" ? `Solid showing this round. Encourage ${stu.name.split(" ")[0]} to keep the momentum.` : flagged.length ? `${stu.name.split(" ")[0]} will join faculty-led revision for ${flagged.join(", ")} after class. Please ensure attendance.` : "Steady performance. Keep up the consistency.";
          body += "\n\n- The Rankers Academy";
          return { studentId: stu.id, student: stu, tone, body, type: "post-test" };
        }).filter(Boolean);
      }

      function absenceMessages() {
        const messages = [];
        SUBJECTS.forEach((sub) => Object.entries(state.attendance[sub] || {}).forEach(([sid, status]) => {
          if (status !== "absent") return;
          const stu = getStudentById(sid) || { id: sid, name: sid, parentPhone: "" };
          messages.push({ studentId: sid, student: stu, subject: sub, type: "absence", tone: "Absence", body: `Dear Parent,\n\n${stu.name} was marked ABSENT for the ${sub} revision session today (${CLUSTER_SCHEDULE[sub].time}).\n\nThis was a faculty-led targeted coaching session for students who scored below the threshold. Missing it directly impacts ${stu.name.split(" ")[0]}'s performance.\n\nPlease discuss this at home.\n\n- ${CLUSTER_SCHEDULE[sub].faculty}\n  The Rankers Academy` });
        }));
        return messages;
      }

      function msgId(m) { return `${m.studentId}-${m.type}-${m.subject || ""}-${state.testId}`; }

      function messageCard(m) {
        const sent = state.parentAlerts[msgId(m)];
        return card("p-3", `<div class="d-flex align-items-center gap-3">${avatar(m.student.name, 36)}<div class="flex-grow-1"><b>${esc(m.student.name)}</b> ${badge(m.tone, m.type === "absence" || m.tone === "Concerned" ? "text-bg-danger" : "text-bg-success")} ${m.subject ? badge(m.subject) : ""}<div class="small soft mono">${m.student.parentPhone}</div></div><button class="btn btn-sm btn-outline-light" onclick="toggleMessage('${msgId(m)}')">View</button>${sent ? badge("Sent", "text-bg-success") : `<button class="btn btn-sm btn-brand" onclick='sendMessage(${JSON.stringify(msgId(m))})'>Send</button>`}</div><div id="body-${msgId(m)}" class="mt-3 d-none"><pre class="message-box bg-black bg-opacity-25 border border-secondary border-opacity-25 rounded-3 p-3">${esc(m.body)}</pre>${sent ? `<div class="small soft mono">Sent at ${new Date(sent.sentAt).toLocaleString("en-IN")}</div>` : ""}</div>`);
      }

      function toggleMessage(id) { document.getElementById(`body-${id}`)?.classList.toggle("d-none"); }

      function sendMessage(id) {
        const msg = [...postTestMessages(), ...absenceMessages()].find((m) => msgId(m) === id);
        state.parentAlerts[id] = { ...msg, sentAt: new Date().toISOString(), testId: state.testId };
        setStore(StorageKeys.parentAlerts, state.parentAlerts); render();
      }

      function sendAllMessages() {
        const messages = state.commsTab === "post-test" ? postTestMessages() : absenceMessages();
        messages.forEach((m) => {
          const id = msgId(m);
          if (!state.parentAlerts[id]) state.parentAlerts[id] = { ...m, sentAt: new Date().toISOString(), testId: state.testId };
        });
        setStore(StorageKeys.parentAlerts, state.parentAlerts); render();
      }
    </script>
  </body>
</html>
