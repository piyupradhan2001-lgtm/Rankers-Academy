{% extends 'base.html' %}
{% block content %}
<div class="my-tests-page">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap");

    .my-tests-page {
      --brand-a: #ff8a00;
      --brand-b: #e52e71;
      --brand-c: #7c3aed;
      --muted: #a1a1aa;
      --page-text: #fafafa;
      --page-bg:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124, 58, 237, 0.2), transparent 60%),
        radial-gradient(ellipse 60% 50% at 100% 100%, rgba(229, 46, 113, 0.13), transparent 60%),
        radial-gradient(ellipse 60% 50% at 0% 100%, rgba(255, 138, 0, 0.1), transparent 60%),
        #06060a;
      --page-card-bg: rgba(7, 7, 12, 0.78);
      --page-card-soft-bg: rgba(255, 255, 255, 0.04);
      --page-card-border: rgba(255, 255, 255, 0.09);
      --page-card-soft-border: rgba(255, 255, 255, 0.1);
      --page-card-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.2);
      --page-card-hover-border: rgba(255, 255, 255, 0.28);
      --page-card-hover-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.32);
      --page-nav-bg: rgba(255, 255, 255, 0.04);
      --page-nav-border: rgba(255, 255, 255, 0.08);
      --page-nav-link: #d4d4d8;
      --page-outline-text: #f5f5f5;
      --page-outline-bg: rgba(255, 255, 255, 0.02);
      --page-outline-bg-hover: rgba(255, 255, 255, 0.08);
      --page-outline-border: rgba(255, 255, 255, 0.18);
      --page-outline-border-hover: rgba(255, 255, 255, 0.28);
      --page-button-hover-shadow: 0 10px 22px rgba(124, 58, 237, 0.18);
      --page-table-color: #f4f4f5;
      --page-table-row-color: #f5f5f5;
      --page-table-border: rgba(255, 255, 255, 0.1);
      --page-table-striped: rgba(255, 255, 255, 0.02);
      --page-table-hover: rgba(255, 255, 255, 0.04);
      --page-table-body-bg: rgba(11, 12, 18, 0.94);
      --page-table-body-bg-alt: rgba(15, 17, 24, 0.98);
      --page-table-body-bg-hover: rgba(22, 25, 35, 0.98);
      --page-medal-bg: rgba(255, 255, 255, 0.08);
      --page-medal-border: rgba(255, 255, 255, 0.16);
      --page-highlight-bg: rgba(13, 202, 240, 0.22);
      --page-highlight-striped: rgba(13, 202, 240, 0.28);
      --page-highlight-outline: rgba(13, 202, 240, 0.7);
      --page-upcoming-text: #a1a1aa;
      --page-upcoming-bg: rgba(255, 255, 255, 0.02);
      --page-upcoming-border: rgba(255, 255, 255, 0.16);
      --page-header-bg: rgba(255, 255, 255, 0.04);
      --page-count-badge-bg: rgba(125, 211, 252, 0.16);
      --page-count-badge-text: #bae6fd;
      --page-count-badge-border: rgba(125, 211, 252, 0.24);
      min-height: 100vh;
      padding: 1.5rem 0 2rem;
      color: var(--page-text);
      background: var(--page-bg);
      font-family: "DM Sans", system-ui, sans-serif;
    }

    html[data-admin-theme="light"] .my-tests-page {
      --muted: #64748b;
      --page-text: #0f172a;
      --page-bg:
        radial-gradient(ellipse 85% 55% at 50% -10%, rgba(59, 130, 246, 0.14), transparent 60%),
        radial-gradient(ellipse 65% 55% at 100% 100%, rgba(236, 72, 153, 0.08), transparent 60%),
        radial-gradient(ellipse 60% 50% at 0% 100%, rgba(14, 165, 233, 0.08), transparent 60%),
        linear-gradient(180deg, #f8fbff 0%, #eef3f9 100%);
      --page-card-bg: rgba(255, 255, 255, 0.94);
      --page-card-soft-bg: #f8fbff;
      --page-card-border: #dbe4f0;
      --page-card-soft-border: #e5eaf2;
      --page-card-shadow: 0 16px 34px rgba(18, 104, 255, 0.08);
      --page-card-hover-border: #c7d2fe;
      --page-card-hover-shadow: 0 18px 38px rgba(18, 104, 255, 0.12);
      --page-nav-bg: rgba(255, 255, 255, 0.78);
      --page-nav-border: #dbe4f0;
      --page-nav-link: #475569;
      --page-outline-text: #0f172a;
      --page-outline-bg: rgba(255, 255, 255, 0.9);
      --page-outline-bg-hover: #eef5ff;
      --page-outline-border: #cbd5e1;
      --page-outline-border-hover: #93c5fd;
      --page-button-hover-shadow: 0 14px 28px rgba(18, 104, 255, 0.14);
      --page-table-color: #0f172a;
      --page-table-row-color: #1e293b;
      --page-table-border: #dbe4f0;
      --page-table-striped: #f8fbff;
      --page-table-hover: #eef5ff;
      --page-table-body-bg: rgba(255, 255, 255, 0.98);
      --page-table-body-bg-alt: #f8fbff;
      --page-table-body-bg-hover: #eef5ff;
      --page-medal-bg: #eef5ff;
      --page-medal-border: #c7d2fe;
      --page-highlight-bg: rgba(59, 130, 246, 0.14);
      --page-highlight-striped: rgba(59, 130, 246, 0.18);
      --page-highlight-outline: rgba(37, 99, 235, 0.45);
      --page-upcoming-text: #64748b;
      --page-upcoming-bg: #f8fbff;
      --page-upcoming-border: #dbe4f0;
      --page-header-bg: #f8fbff;
      --page-count-badge-bg: #eef5ff;
      --page-count-badge-text: #334155;
      --page-count-badge-border: #dbe4f0;
    }

    .my-tests-page .display {
      font-family: "Bricolage Grotesque", system-ui, sans-serif;
      letter-spacing: 0;
    }

    .my-tests-page .mono {
      font-family: "DM Mono", monospace;
    }

    .my-tests-page .soft {
      color: var(--muted);
    }

    .my-tests-page .brand-gradient {
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 52%, var(--brand-c));
    }

    .my-tests-page .brand-text {
      background: linear-gradient(135deg, #ffb55a, #f72585 50%, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .my-tests-page .glass {
      background: var(--page-card-bg);
      backdrop-filter: blur(18px) saturate(160%);
    }

    .my-tests-page .app-shell {
      min-height: 100vh;
    }

    .my-tests-page .sticky-head {
      position: sticky;
      top: 0;
      z-index: 5;
      border-radius: 1.25rem;
    }

    .my-tests-page .btn-brand {
      --bs-btn-color: #fff;
      --bs-btn-border-color: transparent;
      --bs-btn-hover-color: #fff;
      --bs-btn-hover-border-color: transparent;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 52%, var(--brand-c));
      border-color: transparent;
      box-shadow: 0 12px 28px rgba(229, 46, 113, 0.2);
    }

    .my-tests-page .btn-outline-light {
      border-color: var(--page-outline-border);
      color: var(--page-outline-text);
      background: var(--page-outline-bg);
    }

    .my-tests-page .btn-outline-light:hover,
    .my-tests-page .btn-outline-light:focus {
      color: var(--page-outline-text);
      background: var(--page-outline-bg-hover);
      border-color: var(--page-outline-border-hover);
    }

    .my-tests-page .hover-card {
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .my-tests-page .hover-card:hover {
      transform: translateY(-2px);
      border-color: var(--page-card-hover-border) !important;
      box-shadow: var(--page-card-hover-shadow) !important;
    }

    .my-tests-page .rise {
      animation: my-tests-rise 0.35s cubic-bezier(0.2, 0.8, 0.3, 1) both;
    }

    @keyframes my-tests-rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .my-tests-page .app-card {
      background: var(--page-card-bg);
      border: 1px solid var(--page-card-border);
      box-shadow: var(--page-card-shadow);
      border-radius: 1.35rem;
    }

    .my-tests-page .app-card-soft {
      background: var(--page-card-soft-bg);
      border: 1px solid var(--page-card-soft-border);
      box-shadow: var(--page-card-shadow);
      border-radius: 1.1rem;
    }

    .my-tests-page .nav-pills {
      gap: 0.35rem;
      background: var(--page-nav-bg);
      border-radius: 999px;
      padding: 0.35rem;
      border: 1px solid var(--page-nav-border);
    }

    .my-tests-page .nav-pills .nav-link {
      color: var(--page-nav-link);
      border-radius: 999px;
      font-weight: 700;
    }

    .my-tests-page .nav-pills .nav-link.tab-upcoming {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      color: var(--page-upcoming-text);
      background: var(--page-upcoming-bg);
      border: 1px dashed var(--page-upcoming-border);
      cursor: not-allowed;
      opacity: 0.82;
    }

    .my-tests-page .nav-pills .nav-link.tab-upcoming:hover,
    .my-tests-page .nav-pills .nav-link.tab-upcoming:focus,
    .my-tests-page .nav-pills .nav-link.tab-upcoming.active {
      color: var(--page-upcoming-text);
      background: var(--page-upcoming-bg);
      border-color: var(--page-upcoming-border);
    }

    .my-tests-page .coming-soon-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.18rem 0.5rem;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(250, 204, 21, 0.16);
      color: #facc15;
      border: 1px solid rgba(250, 204, 21, 0.28);
    }

    .my-tests-page .nav-pills .nav-link.active,
    .my-tests-page .nav-pills .nav-link:hover,
    .my-tests-page .nav-pills .nav-link:focus {
      color: #fff;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 52%, var(--brand-c));
    }

    .my-tests-page .hero-kpi-grid {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .my-tests-page .summary-card-title {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .my-tests-page .summary-card-value {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.05;
    }

    .my-tests-page .summary-card-extra {
      font-size: 0.84rem;
      color: var(--muted);
    }

    .my-tests-page .subject-card:hover .progress-bar {
      filter: brightness(1.18);
    }

    .my-tests-page .student-highlight {
      --bs-table-bg: var(--page-highlight-bg);
      --bs-table-striped-bg: var(--page-highlight-striped);
      outline: 2px solid var(--page-highlight-outline);
      outline-offset: -2px;
    }

    .my-tests-page .rank-medal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.4rem;
      height: 1.4rem;
      margin-left: 0.2rem;
      border-radius: 999px;
      background: var(--page-medal-bg);
      box-shadow: inset 0 0 0 1px var(--page-medal-border);
      font-size: 0.95rem;
      line-height: 1;
    }

    .my-tests-page .reward-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 52%, var(--brand-c));
      box-shadow: 0 0.5rem 1.4rem rgba(229, 46, 113, 0.22);
      color: #fff;
      font-size: 1rem;
      line-height: 1;
      font-weight: 700;
    }

    .my-tests-page .test-slot-btn {
      width: 100%;
      min-height: 6.5rem;
      padding: 1rem 1.2rem 1.05rem;
      border-radius: 1.9rem;
      font-family: "DM Sans", system-ui, sans-serif;
      white-space: normal;
      text-align: left;
      display: flex;
      align-items: flex-start;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .my-tests-page .test-slot-layout {
      display: flex;
      flex-direction: column;
      gap: 0.36rem;
      width: 100%;
      min-width: 0;
      line-height: 1.18;
    }

    .my-tests-page .test-slot-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.6rem;
      flex-wrap: nowrap;
    }

    .my-tests-page .test-slot-name {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.25;
      flex: 1 1 auto;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .my-tests-page .test-slot-meta {
      margin-top: 0.05rem;
      font-family: "DM Mono", monospace;
      font-size: 0.8rem;
      letter-spacing: 0.01em;
      opacity: 0.86;
    }

    .my-tests-page .test-slot-sections {
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
      margin-top: 0.6rem;
    }

    .my-tests-page .test-slot-section-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.22rem 0.55rem;
      font-family: "DM Mono", monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--page-nav-link);
      background: var(--page-card-soft-bg);
      border: 1px solid var(--page-card-soft-border);
    }

    .my-tests-page .test-slot-badge {
      flex: 0 0 auto;
      font-size: 0.64rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .my-tests-page .test-slot-btn.test-slot-selected {
      color: #fdf2f8 !important;
      background: linear-gradient(135deg, rgba(61, 8, 34, 0.96), rgba(91, 20, 62, 0.94) 52%, rgba(64, 24, 96, 0.95)) !important;
      border-color: rgba(244, 114, 182, 0.34) !important;
      box-shadow: 0 14px 28px rgba(76, 13, 50, 0.34) !important;
    }

    .my-tests-page .test-slot-btn.test-slot-selected .test-slot-name,
    .my-tests-page .test-slot-btn.test-slot-selected .test-slot-meta,
    .my-tests-page .test-slot-btn.test-slot-selected .test-slot-section-chip {
      color: #fdf2f8 !important;
    }

    .my-tests-page .test-slot-btn.test-slot-selected .test-slot-section-chip {
      background: rgba(255, 255, 255, 0.08) !important;
      border-color: rgba(244, 114, 182, 0.24) !important;
    }

    .my-tests-page .test-slot-btn.test-slot-selected .test-slot-badge {
      background: rgba(255, 255, 255, 0.12) !important;
      color: #ffe4f1 !important;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .my-tests-page .test-slot-btn.test-slot-upcoming {
      color: #e0f2fe !important;
      background: linear-gradient(135deg, rgba(8, 47, 73, 0.96), rgba(12, 74, 110, 0.94) 52%, rgba(14, 116, 144, 0.9)) !important;
      border-color: rgba(125, 211, 252, 0.28) !important;
      box-shadow: 0 14px 28px rgba(7, 44, 66, 0.26) !important;
    }

    .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-name {
      color: #ecfeff !important;
    }

    .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-meta,
    .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-section-chip {
      color: #dbeafe !important;
    }

    .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-badge {
      background: rgba(255, 255, 255, 0.12) !important;
      color: #e0f2fe !important;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-section-chip {
      background: rgba(255, 255, 255, 0.08) !important;
      border-color: rgba(125, 211, 252, 0.22) !important;
    }

    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-selected {
      color: #831843 !important;
      background: linear-gradient(135deg, #ffe4ec, #fdf2f8 52%, #f5ecff) !important;
      border-color: #f9a8d4 !important;
      box-shadow: 0 14px 28px rgba(236, 72, 153, 0.12) !important;
    }

    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-selected .test-slot-name,
    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-selected .test-slot-meta,
    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-selected .test-slot-section-chip {
      color: #831843 !important;
    }

    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-selected .test-slot-section-chip {
      background: rgba(255, 255, 255, 0.74) !important;
      border-color: rgba(236, 72, 153, 0.18) !important;
    }

    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-selected .test-slot-badge {
      background: rgba(236, 72, 153, 0.12) !important;
      color: #be185d !important;
      border-color: rgba(236, 72, 153, 0.18);
    }

    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-upcoming {
      color: #0c4a6e !important;
      background: linear-gradient(135deg, #dbeafe, #e0f2fe 52%, #ecfeff) !important;
      border-color: #93c5fd !important;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.1) !important;
    }

    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-name,
    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-meta,
    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-section-chip {
      color: #0c4a6e !important;
    }

    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-section-chip {
      background: rgba(255, 255, 255, 0.78) !important;
      border-color: rgba(59, 130, 246, 0.18) !important;
    }

    html[data-admin-theme="light"] .my-tests-page .test-slot-btn.test-slot-upcoming .test-slot-badge {
      background: rgba(59, 130, 246, 0.12) !important;
      color: #1d4ed8 !important;
      border-color: rgba(59, 130, 246, 0.18);
    }

    .my-tests-page #testSelector {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.45fr) minmax(0, 1fr);
      gap: 0.9rem;
      align-items: stretch;
      margin-bottom: 1.75rem !important;
    }

    .my-tests-page .test-slot-live {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%) !important;
      border-color: rgba(5, 150, 105, 0.4) !important;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3) !important;
      animation: pulse-live 2s infinite;
    }

    @keyframes pulse-live {
      0% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
      }
    }

    .my-tests-page .test-slot-btn:hover:not(:disabled),
    .my-tests-page .test-slot-btn:focus-visible:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: var(--page-button-hover-shadow);
    }

    .my-tests-page .test-slot-btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      box-shadow: none;
    }

    .my-tests-page .rank-hero-number {
      font-size: 4rem;
    }

    .my-tests-page .top-performer-card {
      width: 140px;
    }

    .my-tests-page .leaderboard-table {
      margin-bottom: 0;
      --bs-table-bg: transparent;
      --bs-table-color: var(--page-table-color);
      --bs-table-border-color: var(--page-table-border);
      --bs-table-striped-color: var(--page-table-color);
      --bs-table-striped-bg: var(--page-table-striped);
      --bs-table-hover-color: var(--page-table-color);
      --bs-table-hover-bg: var(--page-table-hover);
    }

    .my-tests-page .leaderboard-table thead th {
      background: var(--page-header-bg);
      color: var(--muted);
      border-bottom-color: var(--page-table-border);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .my-tests-page .leaderboard-table tbody td {
      color: var(--page-table-row-color);
      border-bottom-color: var(--page-table-border);
      padding-top: 1rem;
      padding-bottom: 1rem;
      vertical-align: middle;
      background: transparent;
    }

    .my-tests-page .leaderboard-table tbody tr {
      background: var(--page-table-body-bg);
    }

    .my-tests-page .leaderboard-table tbody tr:nth-child(even) {
      background: var(--page-table-body-bg-alt);
    }

    .my-tests-page .leaderboard-table tbody tr:hover {
      background: var(--page-table-body-bg-hover);
    }

    .my-tests-page .leaderboard-table tbody tr.table-active.student-highlight {
      background: var(--page-highlight-bg) !important;
    }

    .my-tests-page .leaderboard-table tbody tr.table-active.student-highlight td {
      background: transparent !important;
    }

    .my-tests-page #leaderboardCountBadge {
      background: var(--page-count-badge-bg) !important;
      color: var(--page-count-badge-text) !important;
      border: 1px solid var(--page-count-badge-border);
    }

    .my-tests-page .leaderboard-rank {
      width: 6rem;
      white-space: nowrap;
      padding-right: 0.4rem !important;

<script>
  (() => {
    const BADGE_DEFS = [
      ["first_test", "T1", "Mock Test Starter", "Completed the first academy test", "bronze"],
      ["top_25", "R25", "Rank Booster", "Entered the top 25 merit band", "silver"],
      ["top_10", "T10", "JEE Main Sprinter", "Cracked the top 10 in class", "gold"],
      ["top_3", "T3", "NEET Podium Performer", "Reached the top 3 merit list", "gold"],
      ["rank_1", "R1", "AIR Mindset Champion", "Held rank #1 on a test", "platinum"],
      ["climb_5", "UP5", "Comeback Climber", "Climbed 5+ ranks in one test", "silver"],
      ["streak_3", "S3", "Consistency Streak", "Improved across 3 tests in a row", "gold"],
      ["subject_90", "90+", "Subject Mastery Badge", "Scored 90+ in any subject", "gold"],
      ["attend_perfect", "ATT", "Revision Warrior", "Attended every assigned booster session", "silver"],
      ["no_cluster", "CLR", "Concept Clear Badge", "Stayed out of coaching clusters this test", "bronze"],
    ].map(([id, icon, name, desc, tier]) => ({ id, icon, name, desc, tier }));

    const THEME_SEQUENCE = [
      { key: "Physics", from: "#0ea5e9", to: "#06b6d4", accent: "#22d3ee", icon: "P" },
      { key: "Chemistry", from: "#d946ef", to: "#ec4899", accent: "#f472b6", icon: "C" },
      { key: "Biology", from: "#22c55e", to: "#16a34a", accent: "#4ade80", icon: "B" },
    ];

    const MEDALS = {
      1: { icon: "🥇", label: "Gold medal" },
      2: { icon: "🥈", label: "Silver medal" },
      3: { icon: "🥉", label: "Bronze medal" },
    };

    const payload = JSON.parse(document.getElementById("my-tests-payload").textContent || "{}");
    const currentStudent = payload.student || {};
    const completedTests = (payload.completedTests || [])
      .map((test) => ({ ...test, kind: "completed" }))
      .sort((left, right) => new Date(left.sortAt) - new Date(right.sortAt));
    const visibleCompleted = completedTests.slice(-2);
    const upcomingSlot = payload.upcomingTest
      ? { ...payload.upcomingTest, kind: "upcoming" }
      : {
          id: "upcoming-placeholder",
          kind: "placeholder",
          name: "Upcoming Test",
          date: "Awaiting schedule",
          shortDate: "Soon",
          launchUrl: "",
          canLaunchNow: false,
        };
    const selectorSlots = [
      visibleCompleted[0] || completedTests[completedTests.length - 1] || null,
      visibleCompleted[1] || visibleCompleted[0] || completedTests[completedTests.length - 1] || null,
      upcomingSlot,
    ];
    const currentStudentId = currentStudent.id || "";
    const studentMap = new Map();

    (completedTests || []).forEach((test) => {
      (test.leaderboard || []).forEach((entry) => {
        studentMap.set(entry.studentId, {
          id: entry.studentId,
          name: entry.studentName || entry.studentId,
          studentRef: entry.studentRef || entry.studentId,
          profilePhotoUrl: entry.profilePhotoUrl || "",
        });
      });
    });

    studentMap.set(currentStudentId, {
      id: currentStudentId,
      name: currentStudent.name || "Student",
      studentRef: currentStudent.username || currentStudentId,
      profilePhotoUrl: currentStudent.profilePhotoUrl || "",
    });

    const rewardsPayload = normalizeRewards(payload.rewards || {});
    const lockedTabs = new Set(["analytics", "rewards"]);

    const state = {
      studentTab: "home",
      studentLeaderboardOpen: false,
      testId:
        (visibleCompleted[1] && visibleCompleted[1].id) ||
        (visibleCompleted[0] && visibleCompleted[0].id) ||
        (completedTests[completedTests.length - 1] && completedTests[completedTests.length - 1].id) ||
        null,
      online: navigator.onLine,
    };

    function isLockedTab(tab) {
      return lockedTabs.has(tab);
    }

    const refs = {
      tabButtons: [...document.querySelectorAll("#studentTabs [data-tab]")],
      testButtons: [...document.querySelectorAll("#testSelector [data-slot-index]")],
      homeSection: document.getElementById("homeSection"),
      analyticsSection: document.getElementById("analyticsSection"),
      rewardsSection: document.getElementById("rewardsSection"),
      rankTierBadge: document.getElementById("rankTierBadge"),
      testStreakBadge: document.getElementById("testStreakBadge"),
      rankShiftBadge: document.getElementById("rankShiftBadge"),
      rankValue: document.getElementById("rankValue"),
      rankSummary: document.getElementById("rankSummary"),
      homeKpiRow: document.getElementById("homeKpiRow"),
      coachingSection: document.getElementById("coachingSection"),
      coachingTitle: document.getElementById("coachingTitle"),
      coachingSchedule: document.getElementById("coachingSchedule"),
      coachingDurationBadge: document.getElementById("coachingDurationBadge"),
      coachingItems: document.getElementById("coachingItems"),
      subjectHint: document.getElementById("subjectHint"),
      subjectCards: document.getElementById("subjectCards"),
      topPerformers: document.getElementById("topPerformers"),
      leaderboardCountBadge: document.getElementById("leaderboardCountBadge"),
      leaderboardBody: document.getElementById("leaderboardBody"),
      leaderboardHeadRow: document.getElementById("leaderboardHeadRow"),
      leaderboardFooterText: document.getElementById("leaderboardFooterText"),
      leaderboardToggleBtn: document.getElementById("leaderboardToggleBtn"),
      rankJourneyRow: document.getElementById("rankJourneyRow"),
      analyticsBreakdownTitle: document.getElementById("analyticsBreakdownTitle"),
      topicAnalyticsContainer: document.getElementById("topicAnalyticsContainer"),
      rewardLevelTitle: document.getElementById("rewardLevelTitle"),
      rewardXpText: document.getElementById("rewardXpText"),
      rewardStreakBadge: document.getElementById("rewardStreakBadge"),
      rewardProgressBar: document.getElementById("rewardProgressBar"),
      rewardsGrid: document.getElementById("rewardsGrid"),
    };

    const clientBootstrapMs = Date.now();
    const serverBootstrapNow = parseIsoDate(payload.serverNow);

    function normalizeRewards(rawRewards) {
      const rewardMap = new Map(BADGE_DEFS.map((badge) => [badge.id, { ...badge, earned: false }]));
      (rawRewards.badges || []).forEach((badge) => {
        const base = rewardMap.get(badge.id) || {};
        rewardMap.set(badge.id, { ...base, ...badge });
      });
      return {
        xp: Number(rawRewards.xp || 0),
        level: Number(rawRewards.level || 1),
        progress: Number(rawRewards.progress || 0),
        streak: Number(rawRewards.streak || 0),
        badges: [...rewardMap.values()],
      };
    }

    function parseIsoDate(value) {
      if (!value) return null;
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function getServerSynchronizedNow() {
      if (!serverBootstrapNow) {
        return new Date();
      }
      return new Date(serverBootstrapNow.getTime() + (Date.now() - clientBootstrapMs));
    }

    function currentTest() {
      return completedTests.find((test) => test.id === state.testId) || null;
    }

    function currentLeaderboard() {
      return currentTest()?.leaderboard || [];
    }

    function currentStudentEntry() {
      return currentLeaderboard().find((entry) => entry.studentId === currentStudentId) || null;
    }

    function currentStudentSectionBreakdown(test) {
      const configuredSections = test?.sectionBreakdown || [];
      if (configuredSections.length) {
        return configuredSections;
      }

      const currentEntry = currentStudentEntry();
      if (currentEntry?.sectionScores?.length) {
        return currentEntry.sectionScores.map((section, index) => ({
          name: section.name || section.sectionName || `Section ${index + 1}`,
          sectionName: section.sectionName || section.name || `Section ${index + 1}`,
          shortLabel:
            section.shortLabel ||
            sectionDisplayLabel(
              { name: section.name || section.sectionName || `Section ${index + 1}` },
              index,
            ),
          score: Number(section.score) || 0,
          total: Number(section.total) || 0,
          percentage:
            Number(section.percentage) ||
            ((Number(section.total) || 0) > 0
              ? Math.round(((Number(section.score) || 0) / Number(section.total)) * 1000) / 10
              : 0),
        }));
      }

      return [];
    }

    function clearNode(node) {
      while (node.firstChild) {
        node.removeChild(node.firstChild);
      }
    }

    function cloneTemplate(id) {
      return document.getElementById(id).content.firstElementChild.cloneNode(true);
    }

    function createAvatar(name, size = 38, photoUrl = "") {
      if (photoUrl) {
        const img = document.createElement("img");
        img.src = photoUrl;
        img.alt = name;
        img.className = "rounded-circle flex-shrink-0";
        img.style.width = `${size}px`;
        img.style.height = `${size}px`;
        img.style.objectFit = "cover";
        return img;
      }

      const span = document.createElement("span");
      const initials = String(name || "S")
        .split(" ")
        .map((part) => part[0])
        .slice(0, 2)
        .join("")
        .toUpperCase();
      span.className = "d-inline-flex align-items-center justify-content-center rounded-circle text-white fw-bold brand-gradient flex-shrink-0";
      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.fontSize = `${Math.max(10, size * 0.32)}px`;
      span.textContent = initials || "S";
      return span;
    }

    function createBadge(text, className) {
      const span = document.createElement("span");
      span.className = `badge rounded-pill ${className}`;
      span.textContent = text;
      return span;
    }

    function createRankMedal(rank) {
      const medal = MEDALS[rank];
      if (!medal) return null;
      const span = document.createElement("span");
      span.className = "rank-medal";
      span.setAttribute("role", "img");
      span.setAttribute("aria-label", medal.label);
      span.title = medal.label;
      span.textContent = medal.icon;
      return span;
    }

    function setProgressBar(bar, value, background) {
      bar.style.width = `${Math.max(0, Math.min(100, Number(value || 0)))}%`;
      bar.style.background = background;
    }

    function normalizeSectionKey(name) {
      const value = String(name || "").toLowerCase();
      if (value.includes("physics") || value === "phy") return "Physics";
      if (value.includes("chemistry") || value === "chem") return "Chemistry";
      if (value.includes("biology") || value === "bio" || value.includes("botany") || value.includes("zoology")) return "Biology";
      if (value.includes("math")) return "Maths";
      return "";
    }

    function getThemeForSection(name, index = 0) {
      const normalized = normalizeSectionKey(name);
      if (normalized) {
        return THEME_SEQUENCE.find((item) => item.key === normalized) || THEME_SEQUENCE[0];
      }
      return THEME_SEQUENCE[index % THEME_SEQUENCE.length];
    }

    function createSubjectIcon(name, index = 0) {
      const theme = getThemeForSection(name, index);
      const span = document.createElement("span");
      span.className = "d-inline-flex align-items-center justify-content-center rounded-3 text-white fw-bold flex-shrink-0";
      span.style.width = "36px";
      span.style.height = "36px";
      span.style.background = `linear-gradient(135deg, ${theme.from}, ${theme.to})`;
      span.textContent = theme.icon || String(name || "S").slice(0, 1).toUpperCase();
      return span;
    }

    function getUpcomingSlotRuntimeState(slot) {
      if (!slot || slot.kind !== "upcoming") {
        return slot;
      }

      const startAt = parseIsoDate(slot.scheduledStartAt);
      const endAt = parseIsoDate(slot.scheduledEndAt);
      const launchWindowOpensAt =
        parseIsoDate(slot.launchWindowOpensAt) ||
        (startAt ? new Date(startAt.getTime() - 10 * 60 * 1000) : null);

      if (!startAt || !endAt) {
        return {
          ...slot,
          canLaunchNow: false,
          isLive: false,
          hasEnded: false,
        };
      }

      const now = getServerSynchronizedNow();
      return {
        ...slot,
        canLaunchNow: !!launchWindowOpensAt && now >= launchWindowOpensAt && now < endAt,
        isLive: now >= startAt && now < endAt,
        hasEnded: now >= endAt,
      };
    }

    function sectionHeaderItems(test) {
      const configuredSections = test?.sectionBreakdown || [];
      if (configuredSections.length) {
        return configuredSections;
      }

      const leaderboardSections = (test?.leaderboard || []).find(
        (entry) => Array.isArray(entry.sectionScores) && entry.sectionScores.length,
      )?.sectionScores || [];

      return leaderboardSections.map((section, index) => ({
        name: section.name || section.sectionName || `Section ${index + 1}`,
        shortLabel:
          section.shortLabel ||
          sectionDisplayLabel(
            { name: section.name || section.sectionName || `Section ${index + 1}` },
            index,
          ),
      }));
    }

    function leaderboardRowTotal(row) {
      if (row?.score !== undefined && row?.score !== null && row?.score !== "") {
        return Number(row.score) || 0;
      }
      if (row?.total !== undefined && row?.total !== null && row?.total !== "") {
        return Number(row.total) || 0;
      }
      return (row?.sectionScores || []).reduce((sum, section) => sum + (Number(section?.score) || 0), 0);
    }

    function leaderboardRowTotalMarks(row, test) {
      if (row?.totalMarks !== undefined && row?.totalMarks !== null && row?.totalMarks !== "") {
        return Number(row.totalMarks) || 0;
      }
      if (test?.totalMarks !== undefined && test?.totalMarks !== null && test?.totalMarks !== "") {
        return Number(test.totalMarks) || 0;
      }
      return (row?.sectionScores || []).reduce((sum, section) => sum + (Number(section?.total) || 0), 0);
    }

    function sectionDisplayLabel(section, index = 0) {
      if (section?.shortLabel) {
        return section.shortLabel;
      }

      const rawName = String(section?.name || `SEC ${index + 1}`).trim();
      if (!rawName) {
        return `SEC ${index + 1}`;
      }

      const compactName = rawName.replace(/\s+/g, " ");
      if (compactName.length <= 8) {
        return compactName.toUpperCase();
      }

      const parts = compactName.split(" ").filter(Boolean);
      if (parts.length === 1) {
        return compactName.slice(0, 8).toUpperCase();
      }

      return parts
        .slice(0, 3)
        .map((part) => part[0])
        .join("")
        .toUpperCase();
    }

    function applyTestSlotButtonState(button, slot, slotIndex) {
      button.classList.remove("btn-brand", "btn-outline-light", "test-slot-selected", "test-slot-upcoming");
      button.disabled = false;
      button.title = "";
      button.replaceChildren();

      if (!slot) {
        button.textContent = "Unavailable";
        button.disabled = true;
        button.classList.add("btn-outline-light");
        return;
      }

      const slotLabel = slotIndex === 0 ? "Previous" : slotIndex === 1 ? "Recent" : "Upcoming";

      if (slot.kind === "completed") {
        const layout = document.createElement("span");
        layout.className = "test-slot-layout";
        const titleRow = document.createElement("span");
        titleRow.className = "test-slot-title-row";
        const nameSpan = document.createElement("span");
        nameSpan.className = "test-slot-name";
        nameSpan.textContent = slot.name;
        titleRow.appendChild(nameSpan);
        titleRow.appendChild(createBadge(slotLabel, "text-bg-dark test-slot-badge"));
        const meta = document.createElement("span");
        meta.className = "test-slot-meta";
        const subjectLabel = slot.subject ? `${slot.subject} • ` : "";
        const attemptedCountLabel =
          Number(slot.attemptedCount || slot.totalStudents || 0) > 0
            ? ` • ${slot.attemptedCount || slot.totalStudents} attempted`
            : "";
        meta.textContent = `${slot.date} • ${subjectLabel}${slot.attempted ? "Completed" : "Not Attempted"}${attemptedCountLabel}`;
        layout.appendChild(titleRow);
        layout.appendChild(meta);
        renderTestSlotSections(layout, slot);
        button.appendChild(layout);
        button.classList.add("btn-outline-light");
        if (slot.id === state.testId) {
          button.classList.add("test-slot-selected");
        }
        return;
      }

      if (slot.kind === "placeholder") {
        const layout = document.createElement("span");
        layout.className = "test-slot-layout";
        const titleRow = document.createElement("span");
        titleRow.className = "test-slot-title-row";
        const nameSpan = document.createElement("span");
        nameSpan.className = "test-slot-name";
        nameSpan.textContent = slot.name;
        titleRow.appendChild(nameSpan);
        const meta = document.createElement("span");
        meta.className = "test-slot-meta";
        meta.textContent = slot.date;
        layout.appendChild(titleRow);
        layout.appendChild(meta);
        button.appendChild(layout);
        button.disabled = true;
        button.title = "No upcoming test has been scheduled yet.";
        button.classList.add("btn-outline-light", "test-slot-upcoming");
        return;
      }

      const runtimeSlot = getUpcomingSlotRuntimeState(slot);
      const layout = document.createElement("span");
      layout.className = "test-slot-layout";

      const titleRow = document.createElement("span");
      titleRow.className = "test-slot-title-row";
      const nameSpan = document.createElement("span");
      nameSpan.className = "test-slot-name";
      nameSpan.textContent = runtimeSlot.name;
      titleRow.appendChild(nameSpan);
      titleRow.appendChild(
        createBadge(
          runtimeSlot.isLive ? "Live" : slotLabel,
          runtimeSlot.isLive ? "text-bg-danger test-slot-badge" : "text-bg-warning text-dark test-slot-badge",
        ),
      );

      const meta = document.createElement("span");
      meta.className = "test-slot-meta";
      if (runtimeSlot.hasEnded) {
        meta.textContent = "This test window has closed.";
      } else if (runtimeSlot.canLaunchNow) {
        meta.textContent = `${runtimeSlot.date} • ${runtimeSlot.time || ""} • Opens now`;
      } else {
        meta.textContent = `${runtimeSlot.date} • ${runtimeSlot.time || ""}`;
      }

      layout.appendChild(titleRow);
      layout.appendChild(meta);
      button.appendChild(layout);
      button.classList.add("btn-outline-light", "test-slot-upcoming");

      const launchable = runtimeSlot.canLaunchNow && !!runtimeSlot.launchUrl;
      if (launchable) {
        button.classList.add("test-slot-live", "test-slot-selected");
      }
      button.disabled = !launchable;
      if (!launchable) {
        button.title = runtimeSlot.hasEnded
          ? "This test window has closed."
          : "This test opens 10 minutes before the scheduled start time.";
      }
    }

    function renderHeader() {

      refs.tabButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === state.studentTab);
      });

      refs.testButtons.forEach((button) => {
        const slot = selectorSlots[Number(button.dataset.slotIndex)];
        applyTestSlotButtonState(button, slot, Number(button.dataset.slotIndex));
      });

      refs.homeSection.classList.toggle("active", state.studentTab === "home");
      refs.analyticsSection.classList.toggle("active", state.studentTab === "analytics");
      refs.rewardsSection.classList.toggle("active", state.studentTab === "rewards");
    }

    function renderHome() {
      const test = currentTest();
      if (!test) {
        refs.rankTierBadge.className = "badge rounded-pill text-bg-secondary";
        refs.rankTierBadge.textContent = "NO TESTS YET";
        refs.rankValue.textContent = "--";
        refs.rankSummary.textContent = "No completed tests available yet.";
        refs.testStreakBadge.classList.add("d-none");
        refs.rankShiftBadge.classList.add("d-none");
        renderKpiCards([
          { label: "Status", value: "Awaiting", extra: "First completed test" },
          { label: "Window", value: "Soon", extra: "Use the upcoming tab to launch" },
        ]);
        clearNode(refs.topPerformers);
        refs.coachingSection.classList.add("d-none");
        clearNode(refs.coachingItems);
        refs.subjectHint.textContent = "";
        clearNode(refs.subjectCards);
        clearNode(refs.leaderboardBody);
        refs.leaderboardCountBadge.textContent = "0 students";
        refs.leaderboardFooterText.textContent = "";
        return;
      }

      const attempted = !!test.attempted;
      const rank = attempted ? test.rank : null;
      const rankDelta = attempted ? test.rankDelta : null;
      const scoreValue = Number(test.score || 0);
      const totalMarks = Number(test.totalMarks || 0);
      const previousRank = rank !== null && rankDelta !== null ? rank + rankDelta : null;
      const weakLabels = (test.coachingItems || []).map((item) => item.name).join(", ");
      const currentSections = currentStudentSectionBreakdown(test);
      const selectedSubjectKey = normalizeSectionKey(test.subject || "");
      const sectionIndex = currentSections.findIndex(
        (section) => normalizeSectionKey(section.name || "") === selectedSubjectKey,
      );
      const sectionLabel =
        selectedSubjectKey ||
        (currentSections[0] && currentSections[0].name) ||
        "Subject";
      let subjectAverageLabel = "N/A";
      let subjectTopLabel = "N/A";

      if (sectionIndex >= 0) {
        const sectionTotal = Number((currentSections[sectionIndex] || {}).total || 0);
        const sectionScores = (test.leaderboard || [])
          .map((entry) => {
            const score = Number(entry.sectionScores?.[sectionIndex]?.score);
            return Number.isFinite(score) ? score : null;
          })
          .filter((score) => score !== null);

        if (sectionScores.length) {
          const average =
            Math.round(
              (sectionScores.reduce((sum, score) => sum + score, 0) / sectionScores.length) *
                10,
            ) / 10;
          subjectAverageLabel =
            sectionTotal > 0 ? `${average}/${sectionTotal}` : `${average}`;
        }

        const topEntry = (test.leaderboard || []).reduce((best, entry) => {
          const currentScore = Number(entry.sectionScores?.[sectionIndex]?.score);
          if (!Number.isFinite(currentScore)) {
            return best;
          }
          if (!best || currentScore > best.score) {
            return {
              score: currentScore,
              name: entry.studentName || entry.studentId || "Student",
            };
          }
          return best;
        }, null);

        if (topEntry) {
          subjectTopLabel =
            sectionTotal > 0
              ? `${topEntry.score}/${sectionTotal} - ${topEntry.name}`
              : `${topEntry.score} - ${topEntry.name}`;
        }
      }

      if (attempted) {
        refs.rankTierBadge.className = `badge rounded-pill ${
          rank <= 10 ? "text-bg-info" : rank <= 25 ? "text-bg-primary" : "text-bg-secondary"
        }`;
        refs.rankTierBadge.textContent = rank <= 10 ? "ELITE" : rank <= 25 ? "RISING STAR" : "BOOST SQUAD";
        refs.rankValue.textContent = `#${rank}`;
      } else {
        refs.rankTierBadge.className = "badge rounded-pill text-bg-secondary";
        refs.rankTierBadge.textContent = "NOT ATTEMPTED";
        refs.rankValue.textContent = "--";
      }

      refs.rankSummary.textContent = `of ${test.totalStudents || currentLeaderboard().length} students - ${test.name}`;

      if (test.testStreak > 0) {
        refs.testStreakBadge.className = "badge rounded-pill text-bg-warning text-dark";
        refs.testStreakBadge.textContent = `${test.testStreak}-TEST STREAK`;
        refs.testStreakBadge.classList.remove("d-none");
      } else {
        refs.testStreakBadge.classList.add("d-none");
      }

      refs.rankShiftBadge.classList.remove("d-none", "text-bg-success", "text-bg-danger", "text-bg-secondary");
      if (!attempted) {
        refs.rankShiftBadge.classList.add("text-bg-secondary");
        refs.rankShiftBadge.textContent = "NA";
      } else if (rankDelta === null) {
        refs.rankShiftBadge.classList.add("text-bg-secondary");
        refs.rankShiftBadge.textContent = "0";
      } else if (rankDelta > 0) {
        refs.rankShiftBadge.classList.add("text-bg-success");
        refs.rankShiftBadge.textContent = `↑ ${rankDelta}`;
      } else if (rankDelta < 0) {
        refs.rankShiftBadge.classList.add("text-bg-danger");
        refs.rankShiftBadge.textContent = `↓ ${Math.abs(rankDelta)}`;
      } else {
        refs.rankShiftBadge.classList.add("text-bg-secondary");
        refs.rankShiftBadge.textContent = "0";
      }

      renderKpiCards([
        {
          label: "Total",
          value: `${scoreValue}/${totalMarks}`,
          extra: attempted
            ? previousRank === null
              ? "First recorded test"
              : rank < previousRank
                ? `Up ${previousRank - rank} ranks`
                : rank > previousRank
                  ? `Down ${rank - previousRank} ranks`
                  : "No rank change"
            : "Missed this test",
        },
        {
          label: "Attempt",
          value: attempted ? "Submitted" : "Not Attempted",
          extra: attempted ? `Rank #${rank}` : "Cohort data still available",
        },
        {
          label: "Cluster",
          value: weakLabels || "None",
          extra: weakLabels ? "Targeted revision" : "Concepts look stable",
        },
        {
          label: "Date",
          value: test.shortDate || test.date || "--",
          extra: test.time || test.date || "",
        },
        {
          label: `${sectionLabel} Avg`,
          value: subjectAverageLabel,
          extra: `Top: ${subjectTopLabel}`,
        },
      ]);

      renderCoaching(test);
      renderSubjectCards(test);
      renderTopPerformers(test);
      renderLeaderboard(test);
    }

        node.querySelector(".subject-icon").appendChild(createSubjectIcon(section.shortLabel || section.name, index));

    });

    refs.testButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const slot = selectorSlots[Number(button.dataset.slotIndex)];
        if (!slot) return;

        if (slot.kind === "completed") {
          state.testId = slot.id;
          state.studentLeaderboardOpen = false;
          render();
          return;
        }

        const runtimeSlot = getUpcomingSlotRuntimeState(slot);
        if (runtimeSlot.kind === "upcoming" && runtimeSlot.canLaunchNow && runtimeSlot.launchUrl) {
          window.location.href = runtimeSlot.launchUrl;
        }
      });
    });

    refs.leaderboardToggleBtn.addEventListener("click", () => {
      state.studentLeaderboardOpen = !state.studentLeaderboardOpen;
      renderLeaderboard(currentTest());
    });

    window.addEventListener("online", () => {
      state.online = true;
      renderHeader();
    });

    window.addEventListener("offline", () => {
      state.online = false;
      renderHeader();
    });

    document.addEventListener("keydown", (event) => {
      if (["INPUT", "TEXTAREA", "SELECT"].includes(event.target.tagName)) return;
      if (["1", "2", "3"].includes(event.key)) {
        const nextTab = ["home", "analytics", "rewards"][Number(event.key) - 1];
        state.studentTab = isLockedTab(nextTab) ? "home" : nextTab;
        renderHeader();
      }
    });

    setInterval(() => {
      renderHeader();
    }, 5000);

    render();
  })();
</script>
{% endblock %}
