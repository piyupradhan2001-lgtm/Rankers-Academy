{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attempted Paper Locked</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="{% static 'js/admin-theme.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/admin-dark-overrides.css' %}" />
  </head>
  <body>
    <main class="container py-5">
      <div class="card shadow-sm border-0 mx-auto" style="max-width: 720px;">
        <div class="card-body p-4 p-md-5 text-center">
          <i class="bi bi-lock-fill text-warning d-block mb-3" style="font-size: 3rem;"></i>
          <h3 class="fw-bold">Answer Key Not Available Yet</h3>
          <p class="text-muted mb-2">
            Answer key will be available after {{ answer_key_delay_display }} from test completion.
          </p>
          <p class="mb-4">Available at <strong>{{ available_at_display }}</strong>.</p>
          <a href="{% url 'scholarship_test:scholarship_success' attempt.id %}" class="btn btn-primary">
            Back to Result
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
